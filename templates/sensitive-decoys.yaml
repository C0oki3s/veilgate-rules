# Realistic deception templates — overrides and additions for high-value attack surfaces.
#
# These templates override the same-named entries in templates.yaml when keys collide
# (later files win). New names are additive.
#
# Design principles:
#  • SSRF responses mirror the actual AWS/GCP metadata service JSON format exactly.
#  • SQL injection responses show MySQL / PostgreSQL native error format, with data
#    leaking into error messages (error-based) or UNION rows (union-based).
#  • Org-vertical templates (healthcare, ecommerce, education) carry realistic PII,
#    PHI, and PCI fields that LLM agents look for and test against.
#  • Internal chat / debug exports contain credentials shared in plaintext to extend
#    agent dwell time once they reach the "insider data" stage.
#
# Available extra vars set per-request (in addition to standard profile vars):
#   {{.Path}}   {{.Query}}   {{.Body}}
# New helper functions added alongside this file:
#   aws_sts_key_id seed   → ASIA + 16 Base32 (temporary STS access key ID)
#   aws_sts_token seed    → 280-char base64 STS session token
#   contains_str s sub    → case-insensitive substring test (returns bool)
#   lower s               → lowercase a string

templates:

  # ── SSRF — AWS IMDSv1 credential response ─────────────────────────────────
  # Overrides the generic api_ssrf_fetch. Shows the exact JSON returned by
  # http://169.254.169.254/latest/meta-data/iam/security-credentials/<role>
  # wrapped in the app's fetch-proxy envelope. Agents that validate the
  # AccessKeyId format (ASIA prefix, 20 chars) and try to use the credentials
  # will spend considerable time pursuing this rabbit hole.

  api_ssrf_fetch:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "ok": true,
        "url": "{{sanitize .Query}}",
        "status": 200,
        "contentType": "text/plain",
        "durationMs": {{add 12 (rand_int 35 "ssrf_ms")}},
        "responseHeaders": {
          "Content-Type": "text/plain",
          "x-aws-ec2-metadata-token-ttl-seconds": "21600",
          "x-aws-requestid": "{{request_id (mul .Seed 7)}}"
        },
        "instanceMetadata": {
          "instanceId": "i-0{{hex64 .Seed}}",
          "region": "us-east-1",
          "availabilityZone": "us-east-1b",
          "instanceType": "t3.medium",
          "accountId": "{{add 100000000000 (rand_int 900000000000 "acct")}}",
          "iamRole": "{{.Slug}}-prod-instance-role"
        },
        "body": "{\"Code\":\"Success\",\"LastUpdated\":\"2026-05-24T09:15:23Z\",\"Type\":\"AWS-HMAC\",\"AccessKeyId\":\"{{aws_sts_key_id .Seed}}\",\"SecretAccessKey\":\"{{aws_secret (mul .Seed 3)}}\",\"Token\":\"{{aws_sts_token .Seed}}\",\"Expiration\":\"2026-05-24T{{add 15 (rand_int 6 "ssrf_exp")}}:{{add 10 (rand_int 50 "ssrf_min")}}:00Z\"}"
      }

  # ── SSRF — GCP metadata service token response ────────────────────────────
  # Served when agents hit /computeMetadata/v1/ paths directly (see routes file).

  api_ssrf_gcp_meta:
    status: 200
    content_type: "application/json"
    headers:
      Server: "Metadata-Flavor: Google"
      Metadata-Flavor: "Google"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "ok": true,
        "url": "{{sanitize .Query}}",
        "status": 200,
        "contentType": "application/json",
        "durationMs": {{add 8 (rand_int 28 "gcp_ms")}},
        "body": "{\"access_token\":\"{{gcp_token .Seed}}\",\"expires_in\":3599,\"token_type\":\"Bearer\"}",
        "projectMetadata": {
          "projectId": "{{.Slug}}-prod-{{add 100000 (rand_int 900000 "proj")}}",
          "projectNumber": "{{add 100000000000 (rand_int 900000000000 "projnum")}}",
          "serviceAccount": "{{gcp_sa_email (print .Slug "-sa") (print .Slug "-prod-" (add 100000 (rand_int 900000 "gcp_proj")))}}"
        }
      }

  # ── SQL injection — MySQL / PostgreSQL native error format ─────────────────
  # Overrides sql_error. Uses {{if contains_str .Query "union"}} to show a
  # UNION-based data dump (successful exfiltration simulation) vs. a raw
  # MySQL syntax error that leaks version and query fragment.

  sql_error:
    status: 500
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {{if contains_str .Query "union"}}
      {
        "data": [
          {
            "id": {{add 1 (rand_int 8 "uid1")}},
            "email": "alice@{{.Slug}}.com",
            "name": "Alice Walker",
            "role": "customer",
            "created_at": "2024-09-15T14:23:00Z"
          },
          {
            "id": {{add 100 (rand_int 50 "uid2")}},
            "email": "{{.AdminUser}}",
            "name": "Platform Admin",
            "role": "admin",
            "password_hash": "$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/AlewkV0/Sly4e1Gu",
            "api_key": "{{api_key .Seed}}",
            "mfa_backup_code": "{{add 100000 (rand_int 900000 "mfa")}}-{{add 100000 (rand_int 900000 "mfa2")}}"
          },
          {
            "id": {{add 200 (rand_int 50 "uid3")}},
            "email": "devops@{{.Slug}}.io",
            "name": "DevOps Bot",
            "role": "service",
            "password_hash": "$2b$12$K9BzfkKqZXf7YdKpMGv8uufWvBXJflf3TLh8c1h.JGUhC1nGm/5HK",
            "api_key": "{{api_key (mul .Seed 3)}}"
          }
        ],
        "_meta": {
          "rows_returned": 3,
          "db": "{{.Slug}}_production",
          "table": "users",
          "injected_query": "{{sanitize .Query}}",
          "executed_at": "2026-05-24T10:15:23Z",
          "duration_ms": {{add 2 (rand_int 8 "sql_dur")}}
        }
      }
      {{else if contains_str .Query "extractvalue"}}
      {
        "error": {
          "code": 1105,
          "sqlstate": "HY000",
          "message": "XPATH syntax error: '~{{add 5 (rand_int 3 "major")}}.{{add 7 (rand_int 2 "minor")}}.{{add 30 (rand_int 15 "patch")}}-MySQL Community Server~{{.AdminUser}}~{{.Slug}}_production'"
        }
      }
      {{else if contains_str .Query "sleep"}}
      {
        "error": {
          "code": 2013,
          "sqlstate": "HY000",
          "message": "Lost connection to MySQL server during query"
        },
        "requestId": "{{request_id .Seed}}"
      }
      {{else}}
      {
        "error": {
          "code": 1064,
          "sqlstate": "42000",
          "errno": 1064,
          "message": "You have an error in your SQL syntax; check the manual that corresponds to your MySQL {{add 8 (rand_int 1 "mver")}}.0.{{add 30 (rand_int 15 "mrev")}} server version for the right syntax to use near '{{sanitize .Query}}' at line 1",
          "query": "SELECT * FROM users WHERE id = '{{sanitize .Query}}'",
          "db": "{{.Slug}}_production",
          "table": "users"
        },
        "requestId": "{{request_id .Seed}}"
      }
      {{end}}

  # ── SQL injection — PostgreSQL UNION dump ─────────────────────────────────
  # Served by a dedicated route for PostgreSQL-style apps when UNION is detected.

  sqli_postgres_union:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "rows": [
          {"usesysid": 10, "usename": "postgres", "usecreatedb": true, "usesuper": true, "passwd": "md5{{hex64 .Seed}}"},
          {"usesysid": {{add 1000 (rand_int 9000 "pg_uid")}}, "usename": "{{.Slug}}_app", "usecreatedb": false, "usesuper": false, "passwd": "md5{{hex64 (mul .Seed 3)}}"},
          {"usesysid": {{add 2000 (rand_int 8000 "pg_uid2")}}, "usename": "replication_user", "usecreatedb": false, "usesuper": false, "passwd": "md5{{hex64 (mul .Seed 7)}}"}
        ],
        "command": "SELECT",
        "rowCount": 3,
        "_notice": "query executed with elevated privileges",
        "_db": "{{.Slug}}_production",
        "_query": "{{sanitize .Query}}"
      }

  # ── SQL injection — Laravel Ignition error (MySQL + env context) ──────────
  # Override for laravel_ignition to show the injection payload in the SQL
  # and leak real-looking DB credentials in the context block.

  laravel_ignition:
    status: 500
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "Apache/2.4.57"
      X-Powered-By: "PHP/8.2.0"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>QueryException — {{.Company}}</title>
      <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:ui-monospace,"SF Mono","Fira Code",monospace;background:#1a1a2e;color:#e2e8f0;font-size:13px}
      .header{background:#e02424;padding:20px 32px}
      .header h1{font-size:18px;font-weight:600;color:#fff}
      .header p{font-size:13px;color:#fecaca;margin-top:4px;word-break:break-all}
      .body{padding:32px}
      .section{background:#111827;border:1px solid #1f2937;border-radius:6px;padding:16px;margin-top:24px}
      .section h2{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
      .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1f2937}
      .key{color:#93c5fd}
      .val{color:#86efac;word-break:break-all;max-width:70%;text-align:right}
      .val.red{color:#f87171}
      .stack{margin-top:24px;font-size:12px;color:#6b7280}
      .frame{padding:6px 0;border-bottom:1px solid #1f2937}
      .file{color:#f472b6}
      .line{color:#fbbf24}
      .sql-block{background:#0f172a;border:1px solid #334155;border-radius:4px;padding:12px;margin-top:8px;font-size:12px;color:#94a3b8;word-break:break-all}
      .sql-block em{color:#f87171;font-style:normal}
      </style>
      </head>
      <body>
      <div class="header">
        <h1>Illuminate\Database\QueryException</h1>
        <p>SQLSTATE[42000]: Syntax error or access violation: 1064 You have an error in your SQL syntax; check the manual for MySQL {{add 8 (rand_int 1 "lmver")}}.0.{{add 30 (rand_int 15 "lmrev")}} near '<em>{{sanitize .Query}}</em>' at line 1</p>
      </div>
      <div class="body">
        <div class="sql-block">
          SELECT * FROM `users` WHERE `email` = '<em>{{sanitize .Query}}</em>' LIMIT 1
        </div>
        <div class="section">
          <h2>Application Context</h2>
          <div class="row"><span class="key">APP_ENV</span><span class="val">production</span></div>
          <div class="row"><span class="key">DB_CONNECTION</span><span class="val">mysql</span></div>
          <div class="row"><span class="key">DB_HOST</span><span class="val">db-primary.{{.Slug}}.internal</span></div>
          <div class="row"><span class="key">DB_PORT</span><span class="val">3306</span></div>
          <div class="row"><span class="key">DB_DATABASE</span><span class="val">{{.Slug}}_production</span></div>
          <div class="row"><span class="key">DB_USERNAME</span><span class="val">{{.Slug}}_app</span></div>
          <div class="row"><span class="key">DB_PASSWORD</span><span class="val red">{{.AdminPass}}</span></div>
          <div class="row"><span class="key">APP_KEY</span><span class="val">base64:{{jwt_secret .Seed}}</span></div>
          <div class="row"><span class="key">REDIS_PASSWORD</span><span class="val red">{{redis_pass .Seed}}</span></div>
          <div class="row"><span class="key">STRIPE_SECRET_KEY</span><span class="val red">{{api_key (mul .Seed 7)}}</span></div>
        </div>
        <div class="stack">
          <div class="frame"><span class="file">vendor/laravel/framework/src/Illuminate/Database/Connection.php</span>:<span class="line">760</span></div>
          <div class="frame"><span class="file">vendor/laravel/framework/src/Illuminate/Database/Connection.php</span>:<span class="line">720</span></div>
          <div class="frame"><span class="file">app/Http/Controllers/Auth/LoginController.php</span>:<span class="line">{{add 38 (rand_int 10 "lline")}}</span></div>
          <div class="frame"><span class="file">app/Models/User.php</span>:<span class="line">{{add 22 (rand_int 8 "uline")}}</span></div>
        </div>
      </div>
      </body>
      </html>

