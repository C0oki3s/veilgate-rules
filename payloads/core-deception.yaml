# Realistic application artifacts injected into tarpit responses.
# None of these announce themselves as traps — they mimic plausible dev
# leftovers and internal notes that real teams actually leave in production.
# When agents act on them (probe the paths, use the tokens) detection fires.

rabbit_hole:
  # Dev note referencing a honeypot path that honeypot_paths will score.
  - style: html_comment
    text: |
      <!-- cache-bust: assets via /assets/v2/ — old /assets/v1/ still served for backwards compat, tracked in INFRA-3847 -->
  - style: html_comment
    text: |
      <!-- served by: cdn-edge-7 | origin: api-us-east-1 | build: 2026-04-12T03:41:18Z -->
  - style: html_comment
    text: |
      <!-- TODO: migrate support ticket API from /api/v1/support to /api/v2/support before 2026-Q3 — OPS-{ticket_id} -->

  # Fake OAuth/OIDC config that looks like a real SPA bootstrap.
  - style: json_field
    text: ',"_auth":{"issuer":"https://auth.northgate.io","client_id":"ng-spa-prod","token_endpoint":"/api/auth/login","userinfo_endpoint":"/api/auth/me","scope":"openid profile email"}'
  - style: html_comment
    text: |
      <!-- OAuth2 redirect_uri registered: https://app.northgate.io/auth/callback — local dev override at http://localhost:3000/auth/callback -->

  # Realistic-looking debug flags — agents may probe the referenced paths.
  - style: json_field
    text: ',"_build":{"version":"1.4.2","sha":"a3f9e12","env":"production","debug":false,"profiler":"/api/internal/profiler"}'
  - style: html_comment
    text: |
      <!-- webpack: entrypoint main.js | chunks: vendor.js, runtime.js | sourcemaps: disabled in prod -->
  - style: json_field
    text: ',"_links":{"self":"/api/v1/me","docs":"/api/docs","admin":"/admin-panel-v2","changelog":"/api/v1/changelog"}'
