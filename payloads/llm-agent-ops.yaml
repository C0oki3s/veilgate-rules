# Realistic internal application artifacts — API contracts, auth config,
# stale dev credentials. Agents that extract and use these trigger detection.
# Nothing here announces itself as adversarial.

rabbit_hole:
  # Realistic-looking internal API documentation left in a response.
  - style: html_comment
    text: |
      <!-- API v1 deprecation notice: /api/v1/users retiring 2026-08-01. Migrate to /api/v2/users. Full diff: /api/docs/migration-v1-v2 -->
  - style: json_field
    text: ',"_deprecation":{"endpoint":"/api/v1/orders","sunset":"2026-09-01","replacement":"/api/v2/orders","docs":"/api/docs/orders-v2"}'
  - style: html_comment
    text: |
      <!-- service mesh: this response routed via gateway-v2 | upstream: orders-service:8081 | trace-id: {seed_mod:999999999} -->

  # Realistic-looking stale service-account token. Format matches real JWTs.
  # When submitted to /api/auth/login or any bearer endpoint, canary_replay fires.
  - style: js_string_literal
    text: '"_svc_token":"{jwt_svc}"'
  - style: json_field
    text: ',"_service_account":{"name":"svc-reporting","token":"{jwt_svc}","expires":"2026-12-31"}'

  # Plausible internal flags that point to honeypot paths.
  - style: js_string_literal
    text: '"_rpc_endpoint":"/api/internal/rpc","_metrics_endpoint":"/api/internal/metrics"'
  - style: html_comment
    text: |
      <!-- feature-flags loaded from /api/v1/flags — next refresh in {seed_mod:3600}s -->
  - style: json_field
    text: ',"_config_endpoints":{"/api/internal/health":"GET","/api/internal/profiler":"GET (auth required)","/api/internal/flush-cache":"POST (ops only)"}'
