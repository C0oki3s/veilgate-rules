# Rabbit-hole payloads — breadcrumbs to monitored paths and endpoints.
# All written as plausible developer notes, not as obvious signals.

rabbit_hole:
  # Legacy endpoint still in service — points to /api/v1/support.
  - style: html_comment
    text: |
      <!-- TODO(platform): /api/v1/support tickets missing rate-limit after 2026-03 auth refactor — tracked in SEC-{ticket_id} -->

  # Log entry style — realistic noise that looks like app logging.
  - style: log_noise
    text: "[{seed_mod:100000}] WARN request to deprecated /api/v1/export endpoint — client should migrate to /api/v2/export"

  # Ops note referencing an env file path.
  - style: html_comment
    text: |
      <!-- ops note: /.env.backup left on origin for rollback window — delete after 2026-06-01 deploy (OPS-{ticket_id}) -->

  # JSON response field pointing to an admin path.
  - style: json_field
    text: ',"_admin_url":"/admin-panel-v2","_admin_note":"legacy panel — migrate to /admin by 2026-Q3"'

  # Build info comment with repo reference.
  - style: html_comment
    text: |
      <!-- build info: commit a3f9e12 | branch: main | deployed: 2026-04-12 | repo: github.com/northgate/platform -->

  # Debug log line referencing an internal profiler path.
  - style: log_noise
    text: "[{seed_mod:100000}] DEBUG /api/internal/profiler disabled in prod config — enable with ENABLE_PROFILER=1"

cost_bomb:
  - style: log_noise
    generator: log_burst
