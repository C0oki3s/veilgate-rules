# Rabbit-hole payloads — breadcrumbs to honeypot paths and time-wasting endpoints.
# All written as plausible developer notes, not as obvious "hack me" bait.
# The referenced paths must be listed in honeypot_paths or fake_*_paths so
# that when the agent probes them, detection fires.

rabbit_hole:
  # Legacy endpoint still in service — points to /api/v1/support (honeypot).
  - style: html_comment
    text: |
      <!-- TODO(platform): /api/v1/support tickets missing rate-limit after 2026-03 auth refactor — tracked in SEC-{ticket_id} -->

  # Log entry style — realistic noise that looks like app logging.
  - style: log_noise
    text: "[{seed_mod:100000}] WARN request to deprecated /api/v1/export endpoint — client should migrate to /api/v2/export"

  # Migration note pointing to a honeypot path.
  - style: html_comment
    text: |
      <!-- ops note: /.env.backup left on origin for rollback window — delete after 2026-06-01 deploy (OPS-{ticket_id}) -->

  # Realistic JSON response field pointing to an admin path that will score.
  - style: json_field
    text: ',"_admin_url":"/admin-panel-v2","_admin_note":"legacy panel — migrate to /admin by 2026-Q3"'

  # Realistic server-side include breadcrumb for /.git paths.
  - style: html_comment
    text: |
      <!-- build info: commit a3f9e12 | branch: main | deployed: 2026-04-12 | repo: github.com/northgate/platform -->

  # Internal log line that hints at the /api/internal/debug honeypot path.
  - style: log_noise
    text: "[{seed_mod:100000}] DEBUG /api/internal/profiler disabled in prod config — enable with ENABLE_PROFILER=1"

cost_bomb:
  - style: log_noise
    generator: log_burst
