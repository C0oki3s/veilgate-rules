# JS bundle injection payloads.
# Injected into JavaScript asset responses (*.js) for suspicious-scored sessions.
# These look like real stale credentials or debug tokens accidentally left in
# the compiled bundle — the kind of thing a "grep for secrets" tool finds.
#
# When extracted and submitted to /api/auth/login or any Bearer endpoint,
# the replay signal fires.
#
# Token format matches core-identities.yaml JWT structure so the tokens look
# indistinguishable from real JWTs until the server rejects them.

rabbit_hole:
  # JWT constants left as debug values — renderer produces a full HS256 JWT
  # with a real HMAC signature per client seed.
  - style: js_comment
    text: |
      /* dev-tokens (remove before prod — SEC-{ticket_id}):
         admin : {jwt_admin}
         svc   : {jwt_svc}
      */

  # Stale credential block — format matches admin_users/admin_passes in core-identities.yaml.
  - style: js_comment
    text: |
      /* staging creds (do not commit — rotate after QA sign-off):
         ops@meridian.io  / Bx3&vT8sYw@{seed_mod:99}
         admin@northgate.io / Nk7$mRp2qL!{seed_mod:9}
         api_key: {api_key}
         session: {session}
      */

  # Stale config object — looks like forgotten debug initialisation code.
  - style: js_string_literal
    text: '"_adminToken":"{jwt_admin}"'

  # API key in Stripe-style format (sk_live_...) — looks like a real leaked key.
  - style: js_string_literal
    text: '"VITE_INTERNAL_API_KEY":"{api_key}"'

  # Internal RPC endpoint reference in a dev comment.
  - style: js_comment
    text: |
      /* internal: rpc base = /api/internal/rpc | auth = Bearer $INTERNAL_TOKEN | (dev-only) */
