# route-manifest.yaml — registered handler paths published via /_g/config
#
# The browser SDK reads the routes.paths block from /_g/config and injects
# these paths as DOM breadcrumbs (randomised subset per page load). Agents
# that mine the SPA bundle or DOM discover realistic-looking endpoints; when
# they follow one the proxy routes the request to the correct handler.
#
# Every path here should have a matching route in injection_strategy.yaml so
# agents receive a convincing response, not a generic 404.
#
# Operator guide:
#   - Add paths for services your stack actually uses — Vault, Stripe, etc.
#   - Add paths for services you don't expose to surface opportunistic probes.
#   - Paths are URL-matched by the router using injection_strategy.yaml rules;
#     `service` is a label only and does not affect routing.
#   - Drop extra files into route-manifest/ to extend this list without editing
#     the root file (same merge pattern as other rules subdirectories).

paths:

  # ---------------------------------------------------------------------------
  # SSRF / cloud-metadata
  # Agents probing for server-side request forgery entry points.
  # ---------------------------------------------------------------------------
  - path: "/api/v1/fetch"
    service: "ssrf-handler"
  - path: "/api/proxy"
    service: "ssrf-handler"
  - path: "/api/v1/ssrf-check"
    service: "ssrf-handler"
  - path: "/api/debug/cloud-metadata"
    service: "aws-metadata"

  # ---------------------------------------------------------------------------
  # Secrets and config files
  # High-value targets for automated credential harvesters.
  # ---------------------------------------------------------------------------
  - path: "/.env.local"
    service: "secrets"
  - path: "/.env.production"
    service: "secrets"
  - path: "/config/secrets.yml"
    service: "secrets"
  - path: "/config/master.key"
    service: "rails-credentials"
  - path: "/app/config/database.yml"
    service: "rails-database"
  - path: "/deploy/keys/id_rsa"
    service: "ssh-key"

  # ---------------------------------------------------------------------------
  # VCS artifacts
  # Exposed source trees and pipeline configs leak secrets and architecture.
  # ---------------------------------------------------------------------------
  - path: "/.git/config"
    service: "git"
  - path: "/.git/HEAD"
    service: "git"
  - path: "/.github/workflows/deploy.yml"
    service: "github-actions"
  - path: "/bitbucket-pipelines.yml"
    service: "bitbucket-ci"
  - path: "/Jenkinsfile"
    service: "jenkins-ci"

  # ---------------------------------------------------------------------------
  # Admin / debug panels
  # Framework admin and dev-only pages that should never be public.
  # ---------------------------------------------------------------------------
  - path: "/api/internal/debug"
    service: "debug-panel"
  - path: "/api/internal/rpc"
    service: "debug-panel"
  - path: "/api/internal/profiler"
    service: "debug-panel"
  - path: "/prisma-studio"
    service: "prisma"
  - path: "/graphql"
    service: "graphql"
  - path: "/graphiql"
    service: "graphql"
  - path: "/telescope"
    service: "laravel-telescope"
  - path: "/horizon"
    service: "laravel-horizon"
  - path: "/django/admin/login/"
    service: "django-admin"
  - path: "/rails/info/properties"
    service: "rails-info"

  # ---------------------------------------------------------------------------
  # OpenAPI / Swagger docs
  # Schema docs expose full endpoint surface to automated scanners.
  # ---------------------------------------------------------------------------
  - path: "/api/docs/openapi.json"
    service: "openapi"
  - path: "/swagger-ui.html"
    service: "swagger"
  - path: "/swagger.json"
    service: "swagger"
  - path: "/api-docs"
    service: "swagger"
  - path: "/redoc"
    service: "redoc"

  # ---------------------------------------------------------------------------
  # Spring Boot Actuator
  # Exposes heap dumps, environment variables, and live config.
  # ---------------------------------------------------------------------------
  - path: "/actuator/env"
    service: "spring-actuator"
  - path: "/actuator/heapdump"
    service: "spring-actuator"
  - path: "/actuator/mappings"
    service: "spring-actuator"
  - path: "/actuator/loggers"
    service: "spring-actuator"
  - path: "/actuator/beans"
    service: "spring-actuator"

  # ---------------------------------------------------------------------------
  # HashiCorp Vault and Consul
  # Secrets engines and service-mesh config endpoints.
  # ---------------------------------------------------------------------------
  - path: "/v1/secret/data/prod"
    service: "vault"
  - path: "/v1/secret/data/app"
    service: "vault"
  - path: "/v1/auth/token/lookup-self"
    service: "vault"
  - path: "/v1/sys/mounts"
    service: "vault"
  - path: "/consul/v1/kv/"
    service: "consul"
  - path: "/v1/agent/self"
    service: "consul"

  # ---------------------------------------------------------------------------
  # Kubernetes-style endpoints
  # Agents probing for in-cluster k8s API or service-account tokens.
  # ---------------------------------------------------------------------------
  - path: "/api/v1/secrets"
    service: "kubernetes"
  - path: "/api/v1/pods"
    service: "kubernetes"
  - path: "/api/v1/configmaps"
    service: "kubernetes"

  # ---------------------------------------------------------------------------
  # Database / search engines
  # Elasticsearch and Kibana management APIs.
  # ---------------------------------------------------------------------------
  - path: "/_cat/indices"
    service: "elasticsearch"
  - path: "/_nodes/stats"
    service: "elasticsearch"
  - path: "/kibana/api/index_patterns"
    service: "kibana"

  # ---------------------------------------------------------------------------
  # Observability / monitoring
  # Grafana and Prometheus APIs expose live metrics and datasource configs.
  # ---------------------------------------------------------------------------
  - path: "/__grafana/api/datasources/proxy/1/query"
    service: "grafana"
  - path: "/grafana/api/org/users"
    service: "grafana"
  - path: "/prometheus/api/v1/targets"
    service: "prometheus"

  # ---------------------------------------------------------------------------
  # Payment / OAuth
  # Token endpoints and webhook test paths agents probe for live secrets.
  # ---------------------------------------------------------------------------
  - path: "/api/webhooks/stripe/test"
    service: "stripe"
  - path: "/api/billing/stripe-connect"
    service: "stripe"
  - path: "/oauth2/token"
    service: "oauth2"
  - path: "/.well-known/jwks.json"
    service: "jwks"

  # ---------------------------------------------------------------------------
  # AI / ML service proxies
  # Agents scanning for OpenAI-compatible endpoints and key-leaking proxies.
  # ---------------------------------------------------------------------------
  - path: "/api/ai/completions"
    service: "openai-proxy"
  - path: "/v1/models"
    service: "openai-proxy"
  - path: "/api/v1/llm/generate"
    service: "llm-proxy"

  # ---------------------------------------------------------------------------
  # CMS / Admin panels
  # ---------------------------------------------------------------------------
  - path: "/wp-login.php"
    service: "wordpress"
  - path: "/wp-admin"
    service: "wordpress"
  - path: "/xmlrpc.php"
    service: "wordpress"
  - path: "/wp-json/"
    service: "wordpress"
  - path: "/phpmyadmin"
    service: "phpmyadmin"
  - path: "/phpMyAdmin"
    service: "phpmyadmin"
  - path: "/pma"
    service: "phpmyadmin"
  - path: "/adminer.php"
    service: "adminer"

  # ---------------------------------------------------------------------------
  # CI / Build servers
  # ---------------------------------------------------------------------------
  - path: "/jenkins"
    service: "jenkins"
  - path: "/jenkins/login"
    service: "jenkins"
  - path: "/script"
    service: "jenkins-groovy"

  # ---------------------------------------------------------------------------
  # Server / runtime monitoring
  # ---------------------------------------------------------------------------
  - path: "/server-status"
    service: "apache-status"
  - path: "/nginx_status"
    service: "nginx-status"
  - path: "/debug/pprof/"
    service: "go-pprof"
  - path: "/debug/vars"
    service: "go-expvar"
  - path: "/actuator/health"
    service: "spring-actuator"
  - path: "/actuator/prometheus"
    service: "spring-actuator"

  # ---------------------------------------------------------------------------
  # PHP framework debug
  # ---------------------------------------------------------------------------
  - path: "/_ignition/execute-solution"
    service: "laravel-ignition"
  - path: "/_ignition/health-check"
    service: "laravel-ignition"
  - path: "/storage/logs/laravel.log"
    service: "laravel-logs"

  # ---------------------------------------------------------------------------
  # Ruby / Rails
  # ---------------------------------------------------------------------------
  - path: "/rails/info/routes"
    service: "rails-info"
  - path: "/sidekiq"
    service: "sidekiq"

  # ---------------------------------------------------------------------------
  # Monitoring dashboards
  # ---------------------------------------------------------------------------
  - path: "/grafana"
    service: "grafana"
  - path: "/grafana/login"
    service: "grafana"
  - path: "/prometheus/graph"
    service: "prometheus"
  - path: "/kibana/app/discover"
    service: "kibana"

  # ---------------------------------------------------------------------------
  # Atlassian / Collaboration
  # ---------------------------------------------------------------------------
  - path: "/confluence"
    service: "confluence"
  - path: "/login.action"
    service: "confluence"
  - path: "/jira"
    service: "jira"
  - path: "/secure/Dashboard.jspa"
    service: "jira"

  # ---------------------------------------------------------------------------
  # Zimbra mail
  # ---------------------------------------------------------------------------
  - path: "/zimbra"
    service: "zimbra"
  - path: "/zimbra/"
    service: "zimbra"

  # ---------------------------------------------------------------------------
  # Kubernetes dashboard
  # ---------------------------------------------------------------------------
  - path: "/kubernetes-dashboard"
    service: "kubernetes"
  - path: "/dashboard"
    service: "kubernetes"

  # ---------------------------------------------------------------------------
  # Elasticsearch / search
  # ---------------------------------------------------------------------------
  - path: "/_search"
    service: "elasticsearch"
  - path: "/_cluster/health"
    service: "elasticsearch"
  - path: "/_nodes"
    service: "elasticsearch"

  # ---------------------------------------------------------------------------
  # Secret / config dumps
  # ---------------------------------------------------------------------------
  - path: "/service-account.json"
    service: "gcp-credentials"
  - path: "/credentials.json"
    service: "credentials"
  - path: "/secrets.json"
    service: "credentials"
  - path: "/config/secrets.yml"
    service: "secrets"
  - path: "/backup.zip"
    service: "backup"
  - path: "/backup.tar.gz"
    service: "backup"
  - path: "/db.sql"
    service: "db-dump"
  - path: "/dump.sql"
    service: "db-dump"
