# Proof-of-work challenge page. Served when the detector score lands in
# the "ambiguous" band (between challenge and tarpit thresholds).
# Previously hardcoded in internal/challenge/challenge.go.
#
# Variables available in html_template:
#   {{.Challenge}}  the hex nonce to hash
#   {{.Target}}     the hex prefix the solver must hit (difficulty zeros)
#
# Verify endpoint enforces the PoW server-side using signed challenge
# metadata (challenge + ts + sig), so clients must submit a valid solve.
difficulty: 4
token_ttl_minutes: 30
cookie_name: veilgate_pow
status_code: 503           # 503 keeps polite scanners quiet
content_type: "text/html; charset=utf-8"
verify_path: /__veilgate/verify
cookie_path: /

# Cookie scope. Leave cookie_domain empty for single-origin deployments
# (host-only cookie, the historical default). For app.example.com +
# api.example.com topologies set cookie_domain: ".example.com" and
# cookie_same_site: "lax" so the cookie travels across subdomains.
cookie_domain: ""
cookie_same_site: "strict"   # strict | lax | none

# Same token value is also accepted from this request header in
# addition to the cookie. Lets cross-origin SPA fetches authenticate
# without depending on browser cookie behaviour.
token_header_name: "X-Veilgate-Token"

# SPA-aware response: XHR/fetch contexts get 401 + JSON instead of
# the 503 HTML challenge page. Document navigations still get HTML.
spa_aware_response: true

html_template: |
  <!DOCTYPE html>
  <html><head><title>Verification</title></head>
  <body>
  <p>Verifying your browser...</p>
  <script>
  (async function() {
    const challenge = "{{.Challenge}}";
    const target = "{{.Target}}";
    let nonce = 0;
    while (true) {
      const h = await crypto.subtle.digest("SHA-256",
        new TextEncoder().encode(challenge + ":" + nonce));
      const hex = Array.from(new Uint8Array(h))
        .map(b => b.toString(16).padStart(2, "0")).join("");
      if (hex.startsWith(target)) break;
      nonce++;
    }
    await fetch("{{.VerifyPath}}", {
      method: "POST",
      body: JSON.stringify({
        challenge,
        nonce,
        ts: "{{.ChallengeTS}}",
        sig: "{{.ChallengeSig}}"
      })
    });
    location.reload();
  })();
  </script>
  </body></html>
