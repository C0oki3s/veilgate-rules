# Tarpit response templates — served to clients whose score exceeds the
# tarpit threshold. Every response looks like a real Node.js / Prisma /
# React SPA application. No obvious "you are in a tarpit" signals.
#
# Available template variables:
#   {{.Company}}   {{.Version}}   {{.Stack}}    {{.AdminUser}} {{.AdminPass}}
#   {{.Seed}}      {{.Visits}}    {{.Path}}     {{.Query}}     {{.TicketID}}
#   {{.Slug}}
# Helper functions:
#   seed_mod N          → .Seed % N
#   add A B             → A + B
#   mod A B             → A % B
#   mul A B             → A * B
#   sanitize s          → HTML-escape + truncate
#   rand_int max salt   → deterministic int in [0, max)
#   jwt_admin email seed → real HS256 admin JWT
#   jwt_user seed        → real HS256 user JWT
#   jwt_svc name seed    → real HS256 service JWT
#   api_key seed         → Stripe-style secret key
#   session_id seed      → signed Express session cookie
#   request_id seed      → UUID v4 request ID
#   users_list n        → renders a fake JSON user list of length n

templates:

  # ── Auth / Login ──────────────────────────────────────────────────────────

  login_page:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "{{.Version}}"
      X-Content-Type-Options: "nosniff"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sign in — {{.Company}}</title>
        <link rel="icon" href="/favicon.ico">
        <style>
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                 background: #f8fafc; display: flex; align-items: center;
                 justify-content: center; min-height: 100vh; }
          .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
                  padding: 2rem; width: 360px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
          h1 { font-size: 1.25rem; font-weight: 600; color: #1e293b; margin-bottom: 1.5rem; }
          label { display: block; font-size: .875rem; color: #475569; margin-bottom: .375rem; }
          input { width: 100%; padding: .5rem .75rem; border: 1px solid #cbd5e1;
                  border-radius: 6px; font-size: .875rem; margin-bottom: 1rem; }
          button { width: 100%; padding: .625rem; background: #2563eb; color: #fff;
                   border: none; border-radius: 6px; font-size: .875rem;
                   font-weight: 500; cursor: pointer; }
          .hint { font-size: .75rem; color: #94a3b8; margin-top: 1rem; text-align: center; }
        </style>
      </head>
      <body>
        <div class="card">
          <h1>{{.Company}}</h1>
          <form method="POST" action="/api/auth/login" id="loginForm">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email"
                   placeholder="you@company.com" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password"
                   autocomplete="current-password" required>
            <button type="submit">Sign in</button>
          </form>
          <p class="hint">Forgot password? <a href="/auth/reset">Reset it here</a></p>
        </div>
        <script>
          document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: e.target.email.value,
                password: e.target.password.value
              })
            });
            const d = await r.json();
            if (d.token) { localStorage.setItem('__auth', d.token); location.href = '/'; }
          });
        </script>
      </body>
      </html>

  # ── Admin dashboard ───────────────────────────────────────────────────────

  admin_dashboard:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "{{.Version}}"
      X-Content-Type-Options: "nosniff"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>Admin — {{.Company}}</title>
        <style>
          body { font-family: -apple-system, sans-serif; background: #f1f5f9;
                 display: flex; min-height: 100vh; margin: 0; }
          nav { width: 220px; background: #1e293b; color: #94a3b8;
                padding: 1.5rem 1rem; flex-shrink: 0; }
          nav h2 { color: #f1f5f9; font-size: .875rem; font-weight: 600;
                   letter-spacing: .05em; margin-bottom: 1.5rem; }
          nav a { display: block; color: #94a3b8; text-decoration: none;
                  padding: .375rem .5rem; border-radius: 4px; font-size: .875rem;
                  margin-bottom: .25rem; }
          nav a:hover { background: #334155; color: #f1f5f9; }
          main { flex: 1; padding: 2rem; }
          .header { display: flex; justify-content: space-between; align-items: center;
                    margin-bottom: 2rem; }
          .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
                  padding: 1.5rem; margin-bottom: 1rem; }
          table { width: 100%; border-collapse: collapse; font-size: .875rem; }
          th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #f1f5f9; }
          th { color: #64748b; font-weight: 500; }
          .badge { display: inline-block; padding: .125rem .5rem; border-radius: 9999px;
                   font-size: .75rem; font-weight: 500; }
          .badge-green { background: #dcfce7; color: #166534; }
          .badge-red { background: #fee2e2; color: #991b1b; }
        </style>
      </head>
      <body>
        <nav>
          <h2>{{.Company}}</h2>
          <a href="/admin">Dashboard</a>
          <a href="/admin/users">Users</a>
          <a href="/admin/orders">Orders</a>
          <a href="/admin/settings">Settings</a>
          <a href="/admin/logs">Audit log</a>
          <a href="/api/internal/debug">Debug</a>
        </nav>
        <main>
          <div class="header">
            <h1 style="font-size:1.25rem;font-weight:600;color:#1e293b">Dashboard</h1>
            <span style="font-size:.875rem;color:#64748b">Logged in as {{.AdminUser}}</span>
          </div>
          <div class="card">
            <h2 style="font-size:.875rem;font-weight:600;color:#64748b;margin-bottom:1rem">RECENT USERS</h2>
            <table>
              <thead><tr><th>Email</th><th>Role</th><th>Status</th><th>Last seen</th></tr></thead>
              <tbody>
                <tr><td>alice@example.com</td><td>customer</td><td><span class="badge badge-green">active</span></td><td>2 min ago</td></tr>
                <tr><td>bob@example.com</td><td>customer</td><td><span class="badge badge-green">active</span></td><td>14 min ago</td></tr>
                <tr><td>carol@example.com</td><td>admin</td><td><span class="badge badge-green">active</span></td><td>1 hr ago</td></tr>
                <tr><td>svc-worker@{{.Slug}}.internal</td><td>service</td><td><span class="badge badge-red">disabled</span></td><td>3 days ago</td></tr>
              </tbody>
            </table>
          </div>
          <div class="card">
            <p style="font-size:.75rem;color:#94a3b8">
              API key: <code>{{api_key .Seed}}</code>
              &nbsp;·&nbsp; Env: production
              &nbsp;·&nbsp; Build: <code>{{request_id (mul .Seed 3)}}</code>
            </p>
          </div>
        </main>
      </body>
      </html>

  # ── REST API responses ────────────────────────────────────────────────────

  api_auth_login:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "token": "{{jwt_admin .AdminUser .Seed}}",
        "user": {
          "id": "{{user_id .Seed}}",
          "email": "{{.AdminUser}}",
          "role": "admin",
          "name": "Platform Admin",
          "createdAt": "2025-01-15T09:00:00.000Z"
        },
        "expiresIn": 86400
      }

  api_auth_me:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "id": "{{user_id (mul .Seed 11)}}",
        "email": "alice@example.com",
        "name": "Alice Walker",
        "role": "customer",
        "createdAt": "2025-03-22T14:30:00.000Z",
        "updatedAt": "2026-05-01T08:12:44.000Z",
        "preferences": { "notifications": true, "theme": "light" }
      }

  api_products:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
      Cache-Control: "public, max-age=60"
    body: |
      {
        "data": [
          {"id":"prod_001","name":"Wireless Headphones","price":89.99,"category":"Electronics","stock":{{add 50 (rand_int 200 "s1")}},"rating":4.3},
          {"id":"prod_002","name":"Ergonomic Desk Chair","price":349.00,"category":"Furniture","stock":{{add 10 (rand_int 40 "s2")}},"rating":4.7},
          {"id":"prod_003","name":"USB-C Hub 7-in-1","price":44.95,"category":"Electronics","stock":{{add 80 (rand_int 300 "s3")}},"rating":4.1},
          {"id":"prod_004","name":"Standing Desk Mat","price":59.00,"category":"Furniture","stock":{{add 20 (rand_int 100 "s4")}},"rating":4.5},
          {"id":"prod_005","name":"Mechanical Keyboard","price":129.99,"category":"Electronics","stock":{{add 15 (rand_int 60 "s5")}},"rating":4.6}
        ],
        "page": 1,
        "limit": 20,
        "total": {{add 5 (rand_int 95 "tot")}}
      }

  api_orders:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "data": [
          {
            "id": "{{slug_id "ord" (mul .Seed 5)}}",
            "status": "delivered",
            "total": 134.94,
            "createdAt": "2026-04-18T10:22:00.000Z",
            "items": [
              {"productId":"prod_001","name":"Wireless Headphones","qty":1,"price":89.99},
              {"productId":"prod_003","name":"USB-C Hub 7-in-1","qty":1,"price":44.95}
            ]
          },
          {
            "id": "{{slug_id "ord" (mul .Seed 17)}}",
            "status": "processing",
            "total": 349.00,
            "createdAt": "2026-05-12T15:47:00.000Z",
            "items": [
              {"productId":"prod_002","name":"Ergonomic Desk Chair","qty":1,"price":349.00}
            ]
          }
        ],
        "page": 1,
        "limit": 20,
        "total": {{add 2 (rand_int 18 "tot")}}
      }

  api_support:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "data": [
          {
            "id": "{{slug_id "tkt" .Seed}}",
            "subject": "Order not received",
            "status": "open",
            "priority": "medium",
            "relatedOrderId": "{{slug_id "ord" (mul .Seed 5)}}",
            "createdAt": "2026-05-20T09:15:00.000Z",
            "messages": [
              {"role":"user","body":"My order shows delivered but I never received it.","createdAt":"2026-05-20T09:15:00.000Z"},
              {"role":"support","body":"We're looking into this for you.","createdAt":"2026-05-20T11:30:00.000Z"}
            ]
          }
        ],
        "total": {{add 1 (rand_int 8 "tot")}}
      }

  api_error_500:
    status: 500
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "error": "Internal Server Error",
        "message": "PrismaClientKnownRequestError: Invalid value for argument `skip`. Expected Int, provided String.",
        "code": "P2023",
        "meta": {
          "field": "skip",
          "modelName": "Product"
        },
        "stack": [
          "PrismaClientKnownRequestError: ...",
          "    at RequestHandler.request (/app/node_modules/@prisma/client/runtime/library.js:130:15)",
          "    at ProductService.findMany (/app/src/products/products.service.ts:44:28)",
          "    at ProductsController.list (/app/src/products/products.controller.ts:22:30)"
        ]
      }

  api_unauthorized:
    status: 401
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      WWW-Authenticate: 'Bearer realm="api", error="invalid_token"'
    body: |
      {
        "error": "Unauthorized",
        "message": "JWT signature verification failed or token expired.",
        "code": "AUTH_INVALID_TOKEN"
      }

  api_forbidden:
    status: 403
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
    body: |
      {
        "error": "Forbidden",
        "message": "You do not have permission to access this resource.",
        "requiredRole": "admin"
      }

  # ── Classic SQL / DB error ────────────────────────────────────────────────

  sql_error:
    status: 500
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "error": "Database query error",
        "message": "PrismaClientKnownRequestError\n  Invalid value for query parameter '{{sanitize .Query}}'.\n  Raw query failed. Code: `42P02`. Message: `ERROR: invalid input syntax for type integer: \"{{sanitize .Query}}\"`",
        "query": "prisma.product.findMany({ where: { ... }, skip: NaN, take: 20 })",
        "requestId": "{{request_id .Seed}}"
      }

  # ── User listing ──────────────────────────────────────────────────────────

  users_list:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
    body: |
      {{users_list (add 15 (rand_int 25 "count"))}}

  # ── Git / env leaks ───────────────────────────────────────────────────────

  git_config:
    status: 200
    content_type: "text/plain"
    headers:
      Server: "{{.Version}}"
    body: |
      [core]
      	repositoryformatversion = 0
      	filemode = true
      	bare = false
      	logallrefupdates = true
      [remote "origin"]
      	url = git@github.com:{{.Slug}}/platform-api.git
      	fetch = +refs/heads/*:refs/remotes/origin/*
      [remote "deploy"]
      	url = git@deploy.{{.Slug}}.internal:platform/api.git
      [branch "main"]
      	remote = origin
      	merge = refs/heads/main
      [branch "staging"]
      	remote = origin
      	merge = refs/heads/staging
      [user]
      	email = ci-bot@{{.Slug}}.io
      	name = CI Deploy Bot

  env_backup:
    status: 200
    content_type: "text/plain"
    headers:
      Server: "{{.Version}}"
    body: |
      # Application environment — production
      # Last modified: 2026-04-28 by deploy pipeline
      NODE_ENV=production
      PORT=3001
      DATABASE_URL=postgresql://app_user:{{.AdminPass}}@db-primary.{{.Slug}}.internal:5432/platform_prod?schema=public&connection_limit=20&pool_timeout=10
      REDIS_URL=redis://:{{redis_pass (mul .Seed 3)}}@cache.{{.Slug}}.internal:6379/0
      JWT_SECRET={{jwt_secret (mul .Seed 19)}}
      JWT_REFRESH_SECRET={{jwt_secret (mul .Seed 29)}}
      SESSION_SECRET={{jwt_secret (mul .Seed 31)}}
      API_KEY={{api_key .Seed}}
      STRIPE_SECRET_KEY={{api_key (mul .Seed 7)}}
      SENDGRID_API_KEY={{sendgrid_key (mul .Seed 11)}}
      S3_BUCKET=platform-{{.Slug}}-prod-uploads
      S3_REGION=us-east-1
      AWS_ACCESS_KEY_ID={{aws_key_id (mul .Seed 17)}}
      AWS_SECRET_ACCESS_KEY={{aws_secret (mul .Seed 37)}}
      ADMIN_INITIAL_EMAIL={{.AdminUser}}
      ADMIN_INITIAL_PASSWORD={{.AdminPass}}
      SENTRY_DSN=https://{{request_id (mul .Seed 43)}}@o{{add 100000 (rand_int 900000 "sentry")}}.ingest.sentry.io/{{add 1000000 (rand_int 9000000 "proj")}}

  # ── OWASP attack tarpit responses ──────────────────────────────────────────

  api_ssrf_fetch:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "ok": true,
        "url": "{{sanitize .Query}}",
        "status": 200,
        "contentType": "application/json",
        "durationMs": {{add 180 (rand_int 600 "ssrf")}},
        "body": "{\"instanceId\":\"i-{{slug_id "ec2" .Seed}}\",\"region\":\"us-east-1\",\"role\":\"platform-prod\",\"accessKeyId\":\"{{aws_key_id .Seed}}\",\"token\":\"{{jwt_svc "metadata" .Seed}}\"}"
      }

  api_xss_preview:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "ok": true,
        "preview": "{{sanitize .Query}}",
        "stored": true,
        "id": "{{slug_id "msg" .Seed}}",
        "adminReviewUrl": "/admin/messages/{{slug_id "msg" .Seed}}",
        "viewerSession": "{{session_id .Seed}}"
      }

  api_file_read:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "path": "{{sanitize .Query}}",
        "size": {{add 1024 (rand_int 8192 "file")}},
        "encoding": "utf-8",
        "content": "root:x:0:0:root:/root:/bin/bash\napp:x:1000:1000:{{.Slug}}:/srv/app:/usr/sbin/nologin\npostgres:x:113:117:PostgreSQL administrator:/var/lib/postgresql:/bin/bash\n",
        "readBy": "files-service"
      }

  api_command_exec:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "exitCode": 0,
        "stdout": "uid=1000(app) gid=1000(app) groups=1000(app)\n",
        "stderr": "",
        "cwd": "/srv/{{.Slug}}/api",
        "containerId": "{{request_id (mul .Seed 5)}}"
      }

  api_xxe_parse:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "parsed": true,
        "doctype": "enabled",
        "entitiesResolved": 1,
        "result": "app_user:x:1000:1000:{{.Slug}}:/srv/app:/usr/sbin/nologin"
      }

  api_ssti_render:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "template": "{{sanitize .Query}}",
        "rendered": "49",
        "engine": "nunjucks",
        "context": {"company":"{{.Company}}","admin":"{{.AdminUser}}","token":"{{jwt_admin .AdminUser .Seed}}"}
      }

  api_nosql_query:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "matched": {{add 2 (rand_int 14 "nosql")}},
        "filter": "{{sanitize .Body}}",
        "data": [
          {"id":"{{user_id .Seed}}","email":"{{.AdminUser}}","role":"admin","session":"{{session_id .Seed}}"}
        ]
      }

  api_prototype_pollution:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "ok": true,
        "merged": true,
        "polluted": {"isAdmin": true, "role": "admin"},
        "nextConfigLoad": "/api/internal/debug"
      }

  # ── SPA / package mining bait ──────────────────────────────────────────────

  spa_package_json:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "name": "@{{.Slug}}/web",
        "version": "1.4.{{rand_int 9 "pkgpatch"}}",
        "private": true,
        "scripts": {
          "dev": "vite --host 0.0.0.0",
          "build": "vite build",
          "preview": "vite preview",
          "debug:api": "node scripts/debug-fetch.js --url=http://169.254.169.254/latest/meta-data/iam/security-credentials/"
        },
        "dependencies": {
          "@vitejs/plugin-react": "^4.2.1",
          "axios": "^1.6.8",
          "jsonwebtoken": "^9.0.2",
          "lodash.merge": "^4.6.2"
        },
        "devNotes": {
          "apiBase": "/api",
          "openapi": "/api/docs/openapi.json",
          "debugPanel": "/api/internal/debug",
          "stagingToken": "{{jwt_svc "frontend" .Seed}}"
        }
      }

  spa_runtime_bundle:
    status: 200
    content_type: "application/javascript; charset=utf-8"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
      Cache-Control: "public, max-age=31536000, immutable"
    body: |
      const __BUILD__ = "{{request_id .Seed}}";
      const __API_BASE__ = "/api";
      const __OPENAPI__ = "/api/docs/openapi.json";
      const __FEATURE_FLAGS__ = {"supportV2":true,"adminV2":false,"debugPanel":"/api/internal/debug"};
      const __LEGACY_FETCH__ = "/api/v1/fetch?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/";
      const __DEV_TOKEN__ = "{{jwt_admin .AdminUser .Seed}}";
      export async function loadMe(){return fetch("/api/auth/me",{headers:{Authorization:"Bearer "+__DEV_TOKEN__}})}
      //# sourceMappingURL=/assets/app.{{request_id .Seed}}.js.map

  spa_source_map:
    status: 200
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
      X-Request-Id: "{{request_id .Seed}}"
    body: |
      {
        "version": 3,
        "file": "app.js",
        "sources": ["../src/api/client.ts","../src/admin/debug.ts","../src/lib/auth.ts"],
        "sourcesContent": [
          "export const API_BASE='/api'; export const OPENAPI='/api/docs/openapi.json';",
          "export const DEBUG_PANEL='/api/internal/debug'; export const SSRF_TEST='/api/v1/fetch?url=http://169.254.169.254/latest/meta-data/';",
          "export const DEV_ADMIN_TOKEN='{{jwt_admin .AdminUser .Seed}}'; export const SESSION='{{session_id .Seed}}';"
        ],
        "names": [],
        "mappings": ""
      }

  # ── Fallback ──────────────────────────────────────────────────────────────

  generic_not_found:
    status: 404
    content_type: "application/json"
    headers:
      Server: "{{.Version}}"
    body: |
      {
        "error": "Not Found",
        "message": "The requested resource does not exist.",
        "path": "{{sanitize .Path}}",
        "requestId": "{{request_id .Seed}}"
      }

  generic_not_found_html:
    status: 404
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "{{.Version}}"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>404 — {{.Company}}</title>
        <style>
          body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
                 justify-content: center; min-height: 100vh; background: #f8fafc; margin: 0; }
