  gitea_login:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "Gitea"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
    body: |
      <!DOCTYPE html>
      <html lang="en-US">
      <head>
      <meta charset="utf-8">
      <title>Sign In - Gitea</title>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f6f8fa;color:#24292e;font-size:14px}
      #navbar{background:#fff;border-bottom:1px solid #e1e4e8;padding:0 16px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0}
      #navbar .brand{color:#000;font-size:20px;font-weight:700;text-decoration:none}
      .page-content{max-width:440px;margin:40px auto;padding:0 16px}
      .segment{background:#fff;border:1px solid #e1e4e8;border-radius:6px;padding:24px}
      .segment h2{font-size:22px;font-weight:600;margin-bottom:20px;text-align:center}
      .field{margin-bottom:16px}
      .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
      .field input{width:100%;padding:8px 12px;border:1px solid #e1e4e8;border-radius:6px;font-size:14px;outline:none}
      .field input:focus{border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,0.1)}
      .checkbox{display:flex;align-items:center;gap:8px;font-size:13px;color:#57606a;margin-bottom:20px}
      .btn{width:100%;padding:10px;background:#2da44e;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
      .btn:hover{background:#2c974b}
      .divider{text-align:center;color:#57606a;font-size:13px;margin:20px 0;position:relative}
      .divider::before,.divider::after{content:"";position:absolute;top:50%;width:44%;height:1px;background:#e1e4e8}
      .divider::before{left:0}.divider::after{right:0}
      .center{text-align:center;font-size:13px;color:#57606a;margin-top:16px}
      .center a{color:#0969da;text-decoration:none}
      </style>
      </head>
      <body>
      <nav id="navbar">
        <a href="/" class="brand">&#x1F423; Gitea</a>
        <div style="flex:1"></div>
        <a href="/explore/repos" style="font-size:13px;color:#57606a;text-decoration:none">Explore</a>
        <a href="/user/sign_up" style="font-size:13px;color:#57606a;text-decoration:none">Register</a>
      </nav>
      <div class="page-content">
        <div class="segment">
          <h2>Sign In</h2>
          <form method="post" action="/user/login">
            <input type="hidden" name="_csrf" value="{{csrf_token .Seed}}">
            <div class="field">
              <label for="user_name">Username or Email Address</label>
              <input type="text" id="user_name" name="user_name" autocomplete="username">
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" autocomplete="current-password">
            </div>
            <label class="checkbox">
              <input type="checkbox" name="remember"> Remember this Device
            </label>
            <button type="submit" class="btn">Sign In</button>
          </form>
          <div class="divider">or</div>
          <div class="center">Don't have an account? <a href="/user/sign_up">Register now</a></div>
        </div>
        <div class="center" style="margin-top:16px">Powered by <a href="/about">Gitea</a> Version: 1.21.11</div>
      </div>
      </body>
      </html>

  sonarqube_login:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "Apache-Coyote/1.1"
      X-Frame-Options: "SAMEORIGIN"
      Cache-Control: "no-cache, no-store, must-revalidate"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>SonarQube</title>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f3f3f3;color:#333;min-height:100vh;display:flex;flex-direction:column}
      .topbar{background:#fff;border-bottom:1px solid #e6e6e6;padding:0 20px;height:60px;display:flex;align-items:center}
      .sq-icon{width:32px;height:32px;background:#4d9fd6;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;margin-right:10px}
      .sq-name{font-size:16px;font-weight:700;color:#333}
      .sq-version{font-size:11px;color:#aaa;margin-left:6px}
      .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
      .card{background:#fff;border:1px solid #e6e6e6;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:40px;width:100%;max-width:420px}
      .card h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:8px}
      .card .subtitle{font-size:13px;color:#666;text-align:center;margin-bottom:28px}
      .form-group{margin-bottom:16px}
      .form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
      .form-group input{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:2px;font-size:14px;outline:none}
      .form-group input:focus{border-color:#4d9fd6;box-shadow:0 0 0 2px rgba(77,159,214,0.2)}
      .btn-login{width:100%;padding:10px;background:#4d9fd6;color:#fff;border:none;border-radius:2px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
      .btn-login:hover{background:#3a8fc6}
      .divider{text-align:center;color:#aaa;font-size:12px;margin:20px 0;position:relative}
      .divider::before,.divider::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:#e6e6e6}
      .divider::before{left:0}.divider::after{right:0}
      .btn-saml{width:100%;padding:9px;background:#fff;color:#333;border:1px solid #ccc;border-radius:2px;font-size:14px;cursor:pointer}
      .btn-saml:hover{background:#f0f0f0}
      .footer{text-align:center;padding:16px;font-size:11px;color:#aaa}
      </style>
      </head>
      <body>
      <div class="topbar">
        <div class="sq-icon">SQ</div>
        <span class="sq-name">SonarQube</span>
        <span class="sq-version">v10.5.1</span>
      </div>
      <div class="main">
        <div class="card">
          <h1>Log in to SonarQube</h1>
          <p class="subtitle">Continuous Inspection</p>
          <form method="post" action="/sessions/login">
            <input type="hidden" name="return_to" value="/projects">
            <div class="form-group">
              <label for="login">Login</label>
              <input type="text" id="login" name="login" placeholder="Enter your login" autocomplete="username">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Log In</button>
          </form>
          <div class="divider">or</div>
          <button class="btn-saml">Log in with SAML</button>
        </div>
      </div>
      <div class="footer">SonarQube &trade; &mdash; Clean Code</div>
      </body>
      </html>
