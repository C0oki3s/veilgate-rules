          h1 { font-size: 4rem; font-weight: 700; color: #1e293b; margin: 0; }
          p { color: #64748b; margin-top: .5rem; }
          a { color: #2563eb; }
        </style>
      </head>
      <body>
        <div class="wrap">
          <h1>404</h1>
