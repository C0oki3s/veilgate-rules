    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>QueryException — Laravel</title>
      <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:ui-monospace,"SF Mono","Fira Code",monospace;background:#1a1a2e;color:#e2e8f0;font-size:13px}
      .header{background:#e02424;padding:20px 32px}
      .header h1{font-size:18px;font-weight:600;color:#fff}
      .header p{font-size:13px;color:#fecaca;margin-top:4px}
      .body{padding:32px}
      .env-block{background:#111827;border:1px solid #1f2937;border-radius:6px;padding:16px;margin-top:24px}
      .env-block h2{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
      .env-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1f2937}
      .env-key{color:#93c5fd}
      .env-val{color:#86efac;word-break:break-all;max-width:60%}
      .stack{margin-top:24px;font-size:12px;color:#6b7280}
      .stack-frame{padding:6px 0;border-bottom:1px solid #1f2937}
      .stack-file{color:#f472b6}
      .stack-line{color:#fbbf24}
      </style>
      </head>
      <body>
      <div class="header">
        <h1>Illuminate\Database\QueryException</h1>
        <p>SQLSTATE[42501]: Insufficient privilege: 7 ERROR: permission denied for table users (SQL: select * from "users" where "email" = {{sanitize .Query}} limit 1)</p>
      </div>
      <div class="body">
        <div class="env-block">
          <h2>Application Context</h2>
          <div class="env-row"><span class="env-key">APP_ENV</span><span class="env-val">production</span></div>
          <div class="env-row"><span class="env-key">DB_HOST</span><span class="env-val">db.{{.Slug}}.internal</span></div>
          <div class="env-row"><span class="env-key">DB_DATABASE</span><span class="env-val">{{.Slug}}_production</span></div>
          <div class="env-row"><span class="env-key">DB_USERNAME</span><span class="env-val">{{.Slug}}_app</span></div>
          <div class="env-row"><span class="env-key">DB_PASSWORD</span><span class="env-val">{{.AdminPass}}</span></div>
          <div class="env-row"><span class="env-key">APP_KEY</span><span class="env-val">base64:{{jwt_secret .Seed}}</span></div>
          <div class="env-row"><span class="env-key">CACHE_DRIVER</span><span class="env-val">redis</span></div>
          <div class="env-row"><span class="env-key">REDIS_PASSWORD</span><span class="env-val">{{redis_pass .Seed}}</span></div>
        </div>
        <div class="stack">
          <div class="stack-frame"><span class="stack-file">vendor/laravel/framework/src/Illuminate/Database/Connection.php</span>:<span class="stack-line">760</span></div>
          <div class="stack-frame"><span class="stack-file">vendor/laravel/framework/src/Illuminate/Database/Connection.php</span>:<span class="stack-line">720</span></div>
          <div class="stack-frame"><span class="stack-file">app/Http/Controllers/Auth/LoginController.php</span>:<span class="stack-line">42</span></div>
          <div class="stack-frame"><span class="stack-file">vendor/laravel/framework/src/Illuminate/Routing/Controller.php</span>:<span class="stack-line">54</span></div>
        </div>
      </div>
      </body>
      </html>

