      .topbar-nav{display:flex;gap:4px;margin-left:auto}
      .topbar-nav a{color:#aaa;text-decoration:none;padding:6px 12px;border-radius:4px;font-size:13px}
      .topbar-nav a.active{background:#2e3142;color:#f4791f}
      .content{padding:24px;max-width:1200px;margin:0 auto}
      .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
      .stat{background:#252636;border:1px solid #2e3142;border-radius:8px;padding:20px;text-align:center}
      .stat .val{font-size:32px;font-weight:700;color:#f4791f}
      .stat .lbl{font-size:12px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
      .card{background:#252636;border:1px solid #2e3142;border-radius:8px;overflow:hidden}
      .card-hdr{padding:14px 20px;border-bottom:1px solid #2e3142;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
      .count{background:#f4791f;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
