      .metric strong{display:block;color:#fff;font-size:24px}
      .metric span{font-size:12px;color:#777;text-transform:uppercase}
      </style>
      </head>
      <body x-data="{objects:{{add 12000 (rand_int 9000 "mobj")}}, usage:{{add 62 (rand_int 18 "muse")}}, requests:{{add 140 (rand_int 90 "mreq")}}}" x-init="setInterval(()=>{requests=Math.max(20,requests+Math.floor(Math.random()*21)-10);objects+=Math.floor(Math.random()*12)},2500)">
      <div class="topbar">
        <div class="logo-icon">M</div>
        <div class="logo-text">MinIO</div>
        <nav class="topbar-nav">
          <a href="/buckets" class="active">Buckets</a>
          <a href="/identity">Identity</a>
          <a href="/access">Access</a>
          <a href="/monitoring">Monitoring</a>
          <a href="/settings">Settings</a>
        </nav>
        <div class="topbar-right">RELEASE.2026-04-18 &nbsp;|&nbsp; admin</div>
      </div>
      <div class="content">
        <div class="metric-grid">
          <div class="metric"><strong x-text="objects"></strong><span>Objects</span></div>
          <div class="metric"><strong><span x-text="usage"></span>%</strong><span>Capacity</span></div>
          <div class="metric"><strong x-text="requests"></strong><span>Req/sec</span></div>
        </div>
        <div class="card">
          <div class="card-hdr">Buckets <button class="btn">+ Create Bucket</button></div>
          <table>
            <thead><tr><th>Name</th><th>Created</th><th>Size</th><th>Objects</th><th>Versioning</th><th>Access</th></tr></thead>
            <tbody>
              <tr><td><a href="/buckets/uploads/browse">uploads</a></td><td>2025-11-02</td><td>12.4 GiB</td><td>9,821</td><td><span class="none">None</span></td><td>Private</td></tr>
              <tr><td><a href="/buckets/backups/browse">backups</a></td><td>2025-11-02</td><td>48.7 GiB</td><td>1,204</td><td><span class="ver">Versioned</span></td><td>Private</td></tr>
              <tr><td><a href="/buckets/exports/browse">exports</a></td><td>2025-12-14</td><td>3.2 GiB</td><td>542</td><td><span class="none">None</span></td><td>Private</td></tr>
              <tr><td><a href="/buckets/assets/browse">assets</a></td><td>2026-01-08</td><td>1.1 GiB</td><td>2,087</td><td><span class="none">None</span></td><td>Public</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card"><div class="card-hdr">S3 request rate <span style="font-size:12px;color:#777">live</span></div><div style="padding:16px"><canvas id="minioChart" height="88"></canvas></div></div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('minioChart'),{type:'line',data:{labels:['-5m','-4m','-3m','-2m','-1m','now'],datasets:[{label:'GET/s',data:[{{add 80 (rand_int 60 "mg1")}},{{add 85 (rand_int 65 "mg2")}},{{add 95 (rand_int 60 "mg3")}},{{add 90 (rand_int 70 "mg4")}},{{add 110 (rand_int 60 "mg5")}},{{add 115 (rand_int 70 "mg6")}}],borderColor:'#c72c48',backgroundColor:'rgba(199,44,72,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
      </script>
      </body>
      </html>

  argocd_login:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "nginx"
      X-Frame-Options: "sameorigin"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>Argo CD</title>
      <link rel="stylesheet" href="{{cdn_pkg "@fontsource/inter" "index.css"}}">
      <script defer src="{{cdn_pkg "chart.js@4.4.3" "dist/chart.umd.min.js"}}"></script>
      <script defer src="{{cdn_pkg "alpinejs@3.14.1" "dist/cdn.min.js"}}"></script>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#12191c;color:#ccd6dd;min-height:100vh;display:flex;flex-direction:column}
      .topbar{background:#100f0f;border-bottom:1px solid #253840;padding:12px 24px;display:flex;align-items:center;gap:16px}
      .topbar-brand{color:#e96d17;font-size:20px;font-weight:700}
      .topbar-version{color:#4a6572;font-size:12px}
      .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;gap:24px}
      .card{background:#1c2b33;border:1px solid #253840;border-radius:8px;padding:40px;width:100%;max-width:400px}
      .apps{background:#1c2b33;border:1px solid #253840;border-radius:8px;padding:24px;width:420px}
      .apps h3{margin:0 0 14px;color:#fff;font-size:16px}
      .app-row{display:flex;justify-content:space-between;border-top:1px solid #253840;padding:9px 0;font-size:13px}
      .sync{color:#65c466}.out{color:#e96d17}
      .card-logo{text-align:center;margin-bottom:28px}
      .card-logo .gear{font-size:48px;filter:drop-shadow(0 0 8px #e96d17)}
      .card-logo h2{color:#fff;font-size:22px;font-weight:600;margin-top:8px}
      .card-logo p{color:#4a6572;font-size:13px;margin-top:4px}
      .form-group{margin-bottom:16px}
      .form-group label{display:block;font-size:13px;color:#8fa8b3;margin-bottom:6px;font-weight:500}
      .form-group input{width:100%;padding:10px 14px;background:#12191c;border:1px solid #2e4450;border-radius:4px;color:#ccd6dd;font-size:14px;outline:none}
      .form-group input:focus{border-color:#e96d17}
      .btn-login{width:100%;padding:12px;background:#e96d17;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
      .btn-login:hover{background:#c85c10}
      .divider{text-align:center;color:#4a6572;font-size:12px;margin:20px 0;position:relative}
      .divider::before,.divider::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:#253840}
      .divider::before{left:0}.divider::after{right:0}
      .btn-sso{width:100%;padding:10px;background:transparent;color:#ccd6dd;border:1px solid #2e4450;border-radius:4px;font-size:14px;cursor:pointer}
      .btn-sso:hover{border-color:#e96d17;color:#e96d17}
      </style>
      </head>
      <body x-data="{synced:{{add 8 (rand_int 8 "argoSync")}}, out:{{rand_int 5 "argoOut"}}, health:{{add 90 (rand_int 8 "argoHealth")}}}" x-init="setInterval(()=>{out=Math.max(0,out+Math.floor(Math.random()*3)-1);health=Math.min(99,Math.max(80,health+Math.floor(Math.random()*5)-2))},3000)">
      <div class="topbar">
        <span class="topbar-brand">&#9881; Argo CD</span>
        <span class="topbar-version">v2.10.4</span>
      </div>
      <div class="main">
        <div class="card">
          <div class="card-logo">
            <div class="gear">&#9881;</div>
            <h2>Argo CD</h2>
            <p>Declarative GitOps CD for Kubernetes</p>
          </div>
          <form method="post" action="/api/v1/session">
            <div class="form-group">
              <label>Username</label>
              <input type="text" name="username" placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Login</button>
          </form>
          <div class="divider">OR</div>
          <button class="btn-sso">Log in via SSO</button>
        </div>
        <div class="apps">
          <h3>Application health</h3>
          <canvas id="argoChart" height="110"></canvas>
          <div class="app-row"><span>platform-api</span><b class="sync">Synced</b></div>
          <div class="app-row"><span>web-console</span><b class="sync">Healthy</b></div>
          <div class="app-row"><span>worker-cron</span><b class="out">OutOfSync</b></div>
          <div class="app-row"><span>synced apps</span><b x-text="synced"></b></div>
          <div class="app-row"><span>health score</span><b><span x-text="health"></span>%</b></div>
        </div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('argoChart'),{type:'doughnut',data:{labels:['Healthy','Progressing','Degraded'],datasets:[{data:[{{add 12 (rand_int 6 "ah1")}},{{add 1 (rand_int 3 "ah2")}},{{rand_int 2 "ah3"}}],backgroundColor:['#65c466','#e96d17','#d64a4a']}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#ccd6dd'}}}}}));
      </script>
      </body>
      </html>

