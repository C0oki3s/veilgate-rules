      .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;font-family:sans-serif}
      .badge-green{background:#1a3a1a;color:#4caf50;border:1px solid #2a5a2a}
      </style>
      </head>
      <body x-data="{routers:14, services:8, middlewares:6, rps:{{add 80 (rand_int 120 "trps")}}}" x-init="setInterval(()=>{rps=Math.max(20,rps+Math.floor(Math.random()*21)-10)},2200)">
      <div class="topbar">
        <span class="topbar-logo">&#9646; Traefik</span>
        <span class="topbar-version">v2.11.3</span>
        <nav class="topbar-nav">
          <a href="/dashboard/" class="active">Dashboard</a>
          <a href="/api/http/routers">HTTP</a>
          <a href="/api/tcp/routers">TCP</a>
          <a href="/api/udp/routers">UDP</a>
        </nav>
      </div>
      <div class="content">
        <div class="stats">
          <div class="stat"><div class="val" x-text="routers"></div><div class="lbl">Routers</div></div>
          <div class="stat"><div class="val" x-text="services"></div><div class="lbl">Services</div></div>
          <div class="stat"><div class="val" x-text="middlewares"></div><div class="lbl">Middlewares</div></div>
          <div class="stat"><div class="val" x-text="rps"></div><div class="lbl">Req/sec</div></div>
        </div>
        <div class="card">
          <div class="card-hdr">HTTP Routers <span class="count">14</span></div>
          <table>
            <thead><tr><th>Name</th><th>Rule</th><th>Entrypoints</th><th>Service</th><th>Status</th></tr></thead>
            <tbody>
              <tr><td>api@internal</td><td>PathPrefix(`/api`) || PathPrefix(`/dashboard`)</td><td>traefik</td><td>api@internal</td><td><span class="badge badge-green">Enabled</span></td></tr>
              <tr><td>web-router</td><td>Host(`app.internal`)</td><td>web,websecure</td><td>web-svc</td><td><span class="badge badge-green">Enabled</span></td></tr>
              <tr><td>api-router</td><td>Host(`api.internal`)</td><td>websecure</td><td>api-svc</td><td><span class="badge badge-green">Enabled</span></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card" style="margin-top:16px"><div class="card-hdr">EntryPoint traffic <span class="count">live</span></div><div style="padding:16px"><canvas id="traefikChart" height="92"></canvas></div></div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('traefikChart'),{type:'line',data:{labels:['-5m','-4m','-3m','-2m','-1m','now'],datasets:[{label:'websecure',data:[{{add 60 (rand_int 40 "tf1")}},{{add 70 (rand_int 45 "tf2")}},{{add 80 (rand_int 50 "tf3")}},{{add 75 (rand_int 55 "tf4")}},{{add 90 (rand_int 45 "tf5")}},{{add 95 (rand_int 60 "tf6")}}],borderColor:'#f4791f',backgroundColor:'rgba(244,121,31,.14)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
      </script>
      </body>
      </html>

  portainer_login:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "Portainer"
      Cache-Control: "no-cache"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>Portainer</title>
      <link rel="stylesheet" href="{{cdn_pkg "@fontsource/inter" "index.css"}}">
      <script defer src="{{cdn_pkg "chart.js@4.4.3" "dist/chart.umd.min.js"}}"></script>
      <script defer src="{{cdn_pkg "alpinejs@3.14.1" "dist/cdn.min.js"}}"></script>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1b2a38;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc}
      .wrap{width:100%;max-width:440px;padding:20px}
      .env-panel{background:#263544;border-radius:8px;padding:18px;margin-top:16px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
      .env-row{display:flex;justify-content:space-between;font-size:12px;color:#9fb3c8;margin-bottom:8px}
      .env-row strong{color:#fff}
      .logo{text-align:center;margin-bottom:32px}
      .logo .icon{width:80px;height:80px;background:#00bcd4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:32px}
      .logo h2{color:#00bcd4;font-size:26px;font-weight:300;margin-top:12px}
      .card{background:#263544;border-radius:8px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
      .card h3{color:#fff;font-size:16px;font-weight:500;margin-bottom:24px;text-align:center}
      .form-group{margin-bottom:16px}
      .form-group label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
      .form-group input{width:100%;padding:10px 14px;background:#1b2a38;border:1px solid #3a4f62;border-radius:4px;color:#fff;font-size:14px;outline:none}
      .form-group input:focus{border-color:#00bcd4}
      .btn{width:100%;padding:12px;background:#00bcd4;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
      .btn:hover{background:#0097a7}
      .version{text-align:center;margin-top:20px;font-size:12px;color:#555}
      </style>
      </head>
      <body x-data="{containers:{{add 9 (rand_int 9 "pct")}}, images:{{add 18 (rand_int 18 "pimg")}}, volumes:{{add 4 (rand_int 7 "pvol")}}}" x-init="setInterval(()=>{containers=Math.max(1,containers+Math.floor(Math.random()*3)-1)},3000)">
      <div class="wrap">
        <div class="logo">
          <div class="icon">&#x1F433;</div>
          <h2>Portainer</h2>
        </div>
        <div class="card">
          <h3>Please sign in</h3>
          <form method="post" action="/api/auth">
            <div class="form-group">
              <label>Username</label>
              <input type="text" name="Username" placeholder="admin" autocomplete="username">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="Password" placeholder="Password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign in</button>
          </form>
        </div>
        <div class="env-panel">
          <div class="env-row"><span>Containers</span><strong x-text="containers"></strong></div>
          <div class="env-row"><span>Images</span><strong x-text="images"></strong></div>
          <div class="env-row"><span>Volumes</span><strong x-text="volumes"></strong></div>
          <canvas id="portainerChart" height="90"></canvas>
        </div>
        <div class="version">Portainer CE 2.20.3</div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('portainerChart'),{type:'doughnut',data:{labels:['Running','Stopped','Unhealthy'],datasets:[{data:[{{add 8 (rand_int 8 "pc1")}},{{add 1 (rand_int 4 "pc2")}},{{rand_int 3 "pc3"}}],backgroundColor:['#00bcd4','#607d8b','#ff5252']}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1'}}}}}));
      </script>
      </body>
      </html>

  keycloak_login:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "WildFly/26"
      X-Frame-Options: "SAMEORIGIN"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
    body: |
      <!DOCTYPE html>
      <html>
      <head>
      <meta charset="utf-8">
      <title>Sign in to Keycloak</title>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:RedHatText,"Overpass",overpass,helvetica,arial,sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}
      .page-header{background:#151515;padding:16px 24px}
      .page-header .brand{color:#fff;font-size:18px;font-weight:600}
      .page-header .brand span{color:#e00}
      .page-main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,#a30000 0%,#cc0000 100%)}
      .login-box{background:#fff;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,0.3);padding:40px;width:100%;max-width:440px}
      .login-box h1{font-size:22px;font-weight:600;color:#151515;margin-bottom:24px}
      .field{margin-bottom:16px}
      .field label{display:block;font-size:14px;font-weight:500;color:#151515;margin-bottom:6px}
      .field .req{color:#e00}
      .field input{width:100%;padding:8px 12px;border:1px solid #8a8d90;border-radius:4px;font-size:14px;color:#151515;outline:none}
      .field input:focus{border-color:#e00;box-shadow:0 0 0 2px rgba(220,0,0,0.15)}
      .btn{padding:8px 16px;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;border:none}
      .btn-primary{background:#e00;color:#fff;width:100%;padding:12px;margin-top:8px;font-size:15px}
      .btn-primary:hover{background:#a30000}
      .divider{text-align:center;color:#6a6e73;font-size:13px;margin:20px 0;position:relative}
      .divider::before,.divider::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:#d2d2d2}
      .divider::before{left:0}.divider::after{right:0}
      .social a{display:block;padding:10px;border:1px solid #d2d2d2;border-radius:4px;text-align:center;text-decoration:none;color:#151515;font-size:14px;margin-bottom:10px}
      .social a:hover{background:#f0f0f0}
      </style>
      </head>
      <body>
      <header class="page-header">
        <span class="brand"><span>Red Hat</span> Single Sign-On / Keycloak</span>
      </header>
      <main class="page-main">
        <div class="login-box">
          <h1>Sign in to your account</h1>
          <form method="post" action="/realms/master/login-actions/authenticate">
            <input type="hidden" name="session_code" value="{{request_id .Seed}}">
            <input type="hidden" name="execution" value="{{request_id (mul .Seed 3)}}">
            <input type="hidden" name="client_id" value="security-admin-console">
            <div class="field">
              <label>Username or email <span class="req">*</span></label>
              <input type="text" name="username" autocomplete="off">
            </div>
            <div class="field">
              <label>Password <span class="req">*</span></label>
              <input type="password" name="password" autocomplete="off">
            </div>
            <button class="btn btn-primary" type="submit">Sign In</button>
          </form>
          <div class="divider">or</div>
          <div class="social">
            <a href="/realms/master/broker/google/login">Sign in with Google</a>
            <a href="/realms/master/broker/github/login">Sign in with GitHub</a>
          </div>
        </div>
      </main>
      </body>
      </html>

  rabbitmq_mgmt:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "Cowboy"
      Vary: "Accept-Encoding"
    body: |
      <!DOCTYPE html>
      <html>
      <head>
      <meta charset="utf-8">
      <title>RabbitMQ Management</title>
      <link rel="stylesheet" href="{{cdn_pkg "@fontsource/inter" "index.css"}}">
      <script defer src="{{cdn_pkg "chart.js@4.4.3" "dist/chart.umd.min.js"}}"></script>
      <script defer src="{{cdn_pkg "alpinejs@3.14.1" "dist/cdn.min.js"}}"></script>
      <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Inter,Arial,"Helvetica Neue",Helvetica,sans-serif;background:#fafafa;color:#333;font-size:13px}
      #header{background:#f60;padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
      #logo{font-size:22px;font-weight:700;color:#fff}
      #logo span{font-size:12px;font-weight:400;opacity:0.8;margin-left:8px}
      .nav{display:flex;gap:0;border-bottom:2px solid #f60}
      .nav a{padding:10px 16px;cursor:pointer;color:#555;text-decoration:none;border-top:2px solid transparent;font-size:13px}
      .nav a:hover{color:#f60}
      .nav a.active{color:#f60;border-top-color:#f60;background:#fff}
      .content{max-width:1200px;margin:0 auto;padding:20px 16px}
      .stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
      .stat{background:#fff;border:1px solid #ddd;border-radius:4px;padding:14px 20px;min-width:120px}
      .stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px}
      .stat .val{font-size:24px;font-weight:700;color:#333;margin-top:4px}
      .stat .val.green{color:#2a9d2a}
      .panel{background:#fff;border:1px solid #ddd;border-radius:4px;overflow:hidden}
      .panel-title{padding:10px 16px;background:#f5f5f5;border-bottom:1px solid #ddd;font-weight:700;font-size:13px}
      table{width:100%;border-collapse:collapse}
      th{padding:8px 12px;background:#f9f9f9;border-bottom:1px solid #e0e0e0;font-size:12px;color:#666;text-align:left}
      td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
      td a{color:#1a7abf;text-decoration:none}
      .idle{color:#888}
      .running{color:#2a9d2a;font-weight:600}
      </style>
      </head>
      <body x-data="{ready:0, unacked:0, total:247, publish:12, deliver:11}" x-init="setInterval(()=>{publish=Math.max(1,publish+Math.floor(Math.random()*5)-2);deliver=Math.max(1,deliver+Math.floor(Math.random()*5)-2);total+=Math.floor(Math.random()*7)},2500)">
      <div id="header">
        <div id="logo">RabbitMQ <span>Management Plugin v3.13.2</span></div>
        <div style="color:rgba(255,255,255,0.9);font-size:12px">Logged in as <strong>guest</strong> | <a href="/logout" style="color:#fff">Log out</a></div>
      </div>
      <div class="nav">
        <a class="active" href="/">Overview</a>
        <a href="/connections">Connections</a>
        <a href="/channels">Channels</a>
        <a href="/exchanges">Exchanges</a>
        <a href="/queues">Queues and Streams</a>
        <a href="/admin">Admin</a>
      </div>
      <div class="content">
        <div class="stats">
          <div class="stat"><div class="lbl">Ready</div><div class="val green" x-text="ready"></div></div>
          <div class="stat"><div class="lbl">Unacked</div><div class="val" x-text="unacked"></div></div>
          <div class="stat"><div class="lbl">Total</div><div class="val" x-text="total"></div></div>
          <div class="stat"><div class="lbl">Publish</div><div class="val"><span x-text="publish"></span>/s</div></div>
          <div class="stat"><div class="lbl">Deliver</div><div class="val"><span x-text="deliver"></span>/s</div></div>
          <div class="stat"><div class="lbl">Nodes</div><div class="val green">1</div></div>
        </div>
        <div class="panel">
          <div class="panel-title">Queues</div>
          <table>
            <thead><tr><th>Virtual host</th><th>Name</th><th>Type</th><th>State</th><th>Ready</th><th>Unacked</th><th>Total</th><th>Rate</th></tr></thead>
            <tbody>
              <tr><td>/</td><td><a href="/queues/%2F/default">default</a></td><td>classic</td><td><span class="running">running</span></td><td>0</td><td>0</td><td>142</td><td>5.2/s</td></tr>
              <tr><td>/</td><td><a href="/queues/%2F/mailers">mailers</a></td><td>classic</td><td><span class="running">running</span></td><td>0</td><td>0</td><td>63</td><td>2.1/s</td></tr>
              <tr><td>/</td><td><a href="/queues/%2F/exports">exports</a></td><td>classic</td><td><span class="idle">idle</span></td><td>0</td><td>0</td><td>42</td><td>0/s</td></tr>
              <tr><td>/</td><td><a href="/queues/%2F/dead_letters">dead_letters</a></td><td>classic</td><td><span class="idle">idle</span></td><td>0</td><td>0</td><td>0</td><td>0/s</td></tr>
            </tbody>
          </table>
        </div>
        <div class="panel" style="margin-top:20px"><div class="panel-title">Message rates</div><div style="padding:12px"><canvas id="rabbitChart" height="85"></canvas></div></div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('rabbitChart'),{type:'line',data:{labels:['-5m','-4m','-3m','-2m','-1m','now'],datasets:[{label:'Publish',data:[{{add 8 (rand_int 10 "rb1")}},{{add 10 (rand_int 8 "rb2")}},{{add 9 (rand_int 12 "rb3")}},{{add 12 (rand_int 10 "rb4")}},{{add 11 (rand_int 9 "rb5")}},{{add 13 (rand_int 8 "rb6")}}],borderColor:'#ff6600',tension:.3},{label:'Deliver',data:[{{add 7 (rand_int 10 "rd1")}},{{add 9 (rand_int 8 "rd2")}},{{add 8 (rand_int 11 "rd3")}},{{add 10 (rand_int 10 "rd4")}},{{add 12 (rand_int 9 "rd5")}},{{add 11 (rand_int 8 "rd6")}}],borderColor:'#2a9d2a',tension:.3}]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}}));
      </script>
      </body>
      </html>

  minio_console:
