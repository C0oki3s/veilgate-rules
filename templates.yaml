    content_type: "text/html; charset=utf-8"
    headers:
      X-Vault-Request: "true"
      Cache-Control: "no-store"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>Sign In | Vault</title>
      <style>
      *{box-sizing:border-box}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
      .topbar{background:#0d0d1a;padding:12px 24px;display:flex;align-items:center}
      .topbar .logo{color:#f5a623;font-size:22px;font-weight:700;letter-spacing:1px}
      .topbar .version{color:#666;font-size:12px;margin-left:10px}
      .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
      .card{background:#252540;border:1px solid #333;border-radius:8px;padding:40px;width:100%;max-width:420px}
      .card h2{margin:0 0 8px;font-size:22px;font-weight:600;color:#fff}
      .card p{margin:0 0 28px;color:#888;font-size:14px}
      .tabs{display:flex;margin-bottom:24px;border:1px solid #444;border-radius:6px;overflow:hidden}
      .tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;background:#1e1e38;color:#aaa;border:none}
      .tab.active{background:#f5a623;color:#000;font-weight:600}
      label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
      input[type=text],input[type=password]{width:100%;padding:10px 12px;background:#1a1a2e;border:1px solid #444;border-radius:4px;color:#e0e0e0;font-size:14px;margin-bottom:16px;outline:none}
      .btn{width:100%;padding:12px;background:#f5a623;color:#000;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer}
