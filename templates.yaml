      .content{flex:1;padding:24px}
      .card{background:#161616;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;margin-bottom:20px}
      .card-hdr{padding:14px 20px;border-bottom:1px solid #2a2a2a;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
      .btn{background:#c72c48;color:#fff;border:none;padding:6px 14px;border-radius:4px;font-size:13px;cursor:pointer;font-weight:500}
      table{width:100%;border-collapse:collapse;font-size:13px}
      th{padding:10px 16px;text-align:left;font-weight:500;color:#666;border-bottom:1px solid #2a2a2a;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
