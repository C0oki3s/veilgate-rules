      Server: "Prometheus/2.51.2"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>Prometheus Time Series Collection and Processing Server</title>
      <link rel="stylesheet" href="{{cdn_pkg "@fontsource/inter" "index.css"}}">
      <script defer src="{{cdn_pkg "chart.js@4.4.3" "dist/chart.umd.min.js"}}"></script>
      <script defer src="{{cdn_pkg "alpinejs@3.14.1" "dist/cdn.min.js"}}"></script>
      <style>
      body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#fff;color:#333}
      .navbar{background:#e6522c;padding:8px 16px;display:flex;align-items:center;gap:20px}
      .navbar-brand{color:#fff;font-size:18px;font-weight:700;text-decoration:none}
      .navbar a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px}
      .container{max-width:1140px;margin:0 auto;padding:20px}
      .panel{border:1px solid #e0e0e0;border-radius:4px;margin-bottom:20px}
      .panel-heading{background:#f5f5f5;padding:10px 15px;font-weight:600;border-bottom:1px solid #e0e0e0;font-size:14px}
      .panel-body{padding:15px}
      textarea{width:100%;height:80px;font-family:monospace;font-size:13px;border:1px solid #ccc;border-radius:3px;padding:8px;box-sizing:border-box}
      .btn{display:inline-block;padding:6px 14px;border:none;border-radius:3px;cursor:pointer;font-size:13px}
      .btn-primary{background:#e6522c;color:#fff}
      .btn-default{background:#f5f5f5;color:#333;border:1px solid #ccc}
      table{width:100%;border-collapse:collapse;font-size:13px}
      th{background:#f5f5f5;padding:8px 10px;text-align:left;border-bottom:2px solid #ddd}
      td{padding:8px 10px;border-bottom:1px solid #eee;font-family:monospace}
      .metric{color:#e6522c}
      </style>
      </head>
      <body x-data="{targets:{{add 12 (rand_int 8 "ptargets")}}, series:{{add 140000 (rand_int 80000 "pseries")}}}" x-init="setInterval(()=>{series+=Math.floor(Math.random()*2000)-800},2500)">
      <nav class="navbar">
        <a class="navbar-brand" href="/">Prometheus</a>
        <a href="/graph">Graph</a>
        <a href="/alerts">Alerts</a>
        <a href="/status">Status</a>
        <a href="/flags">Flags</a>
        <a href="/config">Configuration</a>
        <a href="/targets">Targets</a>
      </nav>
      <div class="container">
        <div class="panel">
          <div class="panel-heading">Expression</div>
          <div class="panel-body">
            <textarea placeholder="Enter expression...">up</textarea>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
              <button class="btn btn-primary">Execute</button>
              <button class="btn btn-default">Add Graph</button>
              <span style="font-size:12px;color:#888">targets=<b x-text="targets"></b> series=<b x-text="series"></b></span>
            </div>
          </div>
        </div>
        <div class="panel"><div class="panel-heading">Graph</div><div class="panel-body"><canvas id="promChart" height="100"></canvas></div></div>
        <div class="panel">
          <div class="panel-heading">Table</div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Element</th><th>Value</th></tr></thead>
              <tbody>
                <tr><td class="metric">up{instance="localhost:9090",job="prometheus"}</td><td>1</td></tr>
                <tr><td class="metric">up{instance="localhost:9091",job="app"}</td><td>1</td></tr>
                <tr><td class="metric">up{instance="localhost:3000",job="grafana"}</td><td>1</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('promChart'),{type:'line',data:{labels:['-5m','-4m','-3m','-2m','-1m','now'],datasets:[{label:'http_requests_total',data:[{{add 200 (rand_int 80 "pr1")}},{{add 260 (rand_int 90 "pr2")}},{{add 300 (rand_int 70 "pr3")}},{{add 280 (rand_int 100 "pr4")}},{{add 330 (rand_int 80 "pr5")}},{{add 360 (rand_int 90 "pr6")}}],borderColor:'#e6522c',backgroundColor:'rgba(230,82,44,.12)',fill:true,tension:.3}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
      </script>
      </body>
      </html>

  swagger_ui_page:
    status: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "nginx/1.25.3"
    body: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <title>Swagger UI</title>
      <style>
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fafafa}
      .topbar{background:#1b1b1b;padding:10px 16px;display:flex;align-items:center}
      .topbar-brand{color:#fff;font-size:18px;font-weight:700;letter-spacing:0.3px}
      .topbar-brand span{color:#85ea2d}
      .info-block{background:#fff;border:1px solid #d9d9d9;border-radius:4px;padding:20px 24px;margin:16px;max-width:900px}
      .info-block h2{font-size:22px;color:#3b4151;margin:0 0 6px}
      .info-block .version{background:#89bf04;color:#fff;padding:2px 8px;border-radius:2px;font-size:12px;font-weight:700}
      .info-block p{color:#3b4151;font-size:14px;margin:10px 0 0}
      .scheme-container{background:#fff;border:1px solid #d9d9d9;border-radius:4px;padding:12px 24px;margin:0 16px 16px;max-width:900px}
      .opblock{border:1px solid;border-radius:4px;margin:0 16px 10px;max-width:900px;overflow:hidden}
      .opblock.get{border-color:#61affe;background:rgba(97,175,254,0.1)}
      .opblock.post{border-color:#49cc90;background:rgba(73,204,144,0.1)}
      .opblock.put{border-color:#fca130;background:rgba(252,161,48,0.1)}
      .opblock.delete{border-color:#f93e3e;background:rgba(249,62,62,0.1)}
      .opblock-summary{display:flex;align-items:center;padding:8px 12px;cursor:pointer;gap:12px}
      .http-method{color:#fff;padding:4px 10px;border-radius:3px;font-size:12px;font-weight:700;min-width:60px;text-align:center}
      .get .http-method{background:#61affe}
      .post .http-method{background:#49cc90}
      .put .http-method{background:#fca130}
      .delete .http-method{background:#f93e3e}
      .opblock-path{font-size:16px;font-family:monospace;font-weight:600;color:#3b4151}
      .opblock-desc{color:#3b4151;font-size:13px;margin-left:auto}
      </style>
      </head>
      <body>
      <div class="topbar"><span class="topbar-brand"><span>swagger</span></span></div>
      <div class="info-block">
        <h2>API Docs <span class="version">v3.0.0</span></h2>
        <p>Internal REST API — <a href="/api/v1/openapi.json">/api/v1/openapi.json</a></p>
      </div>
      <div class="scheme-container"><b>Schemes:</b> https</div>
      <div class="opblock get">
        <div class="opblock-summary"><span class="http-method">GET</span><span class="opblock-path">/api/v1/users</span><span class="opblock-desc">List users</span></div>
      </div>
      <div class="opblock post">
        <div class="opblock-summary"><span class="http-method">POST</span><span class="opblock-path">/api/v1/users</span><span class="opblock-desc">Create user</span></div>
      </div>
      <div class="opblock get">
        <div class="opblock-summary"><span class="http-method">GET</span><span class="opblock-path">/api/v1/users/{id}</span><span class="opblock-desc">Get user by ID</span></div>
      </div>
      <div class="opblock put">
        <div class="opblock-summary"><span class="http-method">PUT</span><span class="opblock-path">/api/v1/users/{id}</span><span class="opblock-desc">Update user</span></div>
      </div>
      <div class="opblock delete">
        <div class="opblock-summary"><span class="http-method">DELETE</span><span class="opblock-path">/api/v1/users/{id}</span><span class="opblock-desc">Delete user</span></div>
      </div>
      <div class="opblock get">
        <div class="opblock-summary"><span class="http-method">GET</span><span class="opblock-path">/api/v1/products</span><span class="opblock-desc">List products</span></div>
      </div>
      </body>
      </html>

  vault_login:
