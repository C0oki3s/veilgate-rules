    headers:
      Server: "Jetty(10.0.18)"
      X-Content-Type-Options: "nosniff"
      X-Hudson: "1.395"
      X-Jenkins: "2.440.3"
    body: |
      <!DOCTYPE html>
      <html>
      <head>
      <meta charset="utf-8">
      <title>Sign in [Jenkins]</title>
      <link rel="stylesheet" href="{{cdn_pkg "@fontsource/inter" "index.css"}}">
      <link rel="stylesheet" href="{{cdn_pkg "bootstrap-icons@1.11.3" "font/bootstrap-icons.min.css"}}">
      <script defer src="{{cdn_pkg "chart.js@4.4.3" "dist/chart.umd.min.js"}}"></script>
      <script defer src="{{cdn_pkg "alpinejs@3.14.1" "dist/cdn.min.js"}}"></script>
      <style>
      *{box-sizing:border-box}
      body{font-family:Inter,"Segoe UI",Helvetica,Arial,sans-serif;background:#fafafa;margin:0}
      .login-title{font-size:28px;font-weight:300;color:#333;text-align:center;padding:40px 0 20px}
      .wrap{display:grid;grid-template-columns:380px 420px;gap:24px;justify-content:center;align-items:start}
      .login-card,.ops-card{background:#fff;border:1px solid #ddd;
        border-radius:4px;padding:32px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
      .ops-card{padding:20px}
      .ops-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
      .ops-head h2{font-size:15px;margin:0;color:#333}
      .pill{font-size:11px;background:#e8f5e9;color:#1b5e20;border:1px solid #c8e6c9;border-radius:999px;padding:3px 8px}
      .metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
      .metric{border:1px solid #eee;border-radius:4px;padding:10px;background:#fcfcfc}
      .metric strong{display:block;font-size:20px;color:#222}
      .metric span{font-size:11px;color:#777}
      .job{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid #eee}
      .job:last-child{border-bottom:none}
      .form-item{margin-bottom:16px}
      label{display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:600}
      input[type=text],input[type=password]{width:100%;padding:8px 10px;border:1px solid #ccc;
        border-radius:3px;font-size:14px}
      .btn-primary{width:100%;padding:10px;background:#335061;color:#fff;
        border:none;border-radius:3px;font-size:14px;cursor:pointer;margin-top:8px}
      .footer{text-align:center;font-size:12px;color:#999;padding:16px}
      </style>
      </head>
      <body>
      <div class="login-title">Jenkins</div>
      <div class="wrap" x-data="{queue:{{add 2 (rand_int 6 "jenkinsq")}}, executors:{{add 3 (rand_int 8 "jenkinsex")}}, failed:{{rand_int 4 "jenkinsfail"}}}" x-init="setInterval(()=>{queue=Math.max(0,queue+Math.floor(Math.random()*3)-1); executors=3+Math.floor(Math.random()*8)},2500)">
        <div class="login-card">
          <form method="post" action="/j_acegi_security_check">
            <div class="form-item">
              <label for="j_username">Username</label>
              <input type="text" name="j_username" id="j_username" autocomplete="username">
            </div>
            <div class="form-item">
              <label for="j_password">Password</label>
              <input type="password" name="j_password" id="j_password" autocomplete="current-password">
            </div>
            <input type="hidden" name="from" value="/">
            <input type="hidden" name="Jenkins-Crumb" value="{{csrf_token .Seed}}">
            <button type="submit" class="btn-primary">Sign in</button>
          </form>
        </div>
        <div class="ops-card">
          <div class="ops-head"><h2><i class="bi bi-activity"></i> Controller status</h2><span class="pill">online</span></div>
          <div class="metric-row">
            <div class="metric"><strong x-text="queue"></strong><span>Queued builds</span></div>
            <div class="metric"><strong x-text="executors"></strong><span>Executors</span></div>
            <div class="metric"><strong x-text="failed"></strong><span>Failed jobs</span></div>
          </div>
          <canvas id="jenkinsBuildChart" height="120"></canvas>
          <div style="margin-top:12px">
            <div class="job"><span>platform-api/main</span><b>#{{add 1800 (rand_int 800 "j1")}}</b></div>
            <div class="job"><span>web-console/release</span><b>#{{add 500 (rand_int 400 "j2")}}</b></div>
            <div class="job"><span>infra/terraform-prod</span><b>#{{add 80 (rand_int 90 "j3")}}</b></div>
          </div>
        </div>
      </div>
      <div class="footer">Jenkins 2.440.3</div>
      <script>
      window.addEventListener('DOMContentLoaded',()=>new Chart(document.getElementById('jenkinsBuildChart'),{type:'line',data:{labels:['10:00','10:05','10:10','10:15','10:20','10:25'],datasets:[{label:'Builds/min',data:[{{add 2 (rand_int 5 "jb1")}},{{add 5 (rand_int 7 "jb2")}},{{add 4 (rand_int 9 "jb3")}},{{add 8 (rand_int 6 "jb4")}},{{add 6 (rand_int 8 "jb5")}},{{add 3 (rand_int 10 "jb6")}}],borderColor:'#335061',backgroundColor:'rgba(51,80,97,.12)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
      </script>
      </body>
      </html>

