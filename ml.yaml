# Online ML classifier hyperparameters. See internal/ml/* for consumers.
#
# The design: Multinomial Naive Bayes learns on every labeled event from
# the rule-based scorer (weak labels: agent if score >= challenge
# threshold, human if score = 0, abstain otherwise). Isolation Forest
# retrains every retrain_every_n_events on the last sample_size numeric
# feature vectors.
#
# Combined signal points = score_max * (alpha*P_bayes + (1-alpha)*anomaly)

enabled: true              # flip to false to stop emitting ml_agent_score
score_max_points: 40       # ceiling contribution to the overall detector score
alpha: 0.7                 # 1.0 = pure Bayes, 0.0 = pure Isolation Forest
burn_in_events: 200        # return 0 until the classifier has seen this much
# Confidence floor — combined (Bayes + anomaly) below this stays silent.
# Range [0,1]. 0.15 = ≥6 points at score_max_points=40. Raise to 0.3 if
# you still see noise on legit traffic; 0 re-enables the old "fire on
# anything positive" behaviour.
min_confidence_to_fire: 0.15

bayes:
  laplace_smoothing: 1.0
  max_ngram_length: 3      # path 1..3-grams
  timing_buckets_seconds: [0.1, 0.5, 1, 2, 5, 10, 30, 60, 300]

iso_forest:
  tree_count: 50
  sample_size: 256
  retrain_every_n_events: 5000
  max_depth: 8             # ceil(log2(sample_size)) by default; override here

miner:
  enabled: true
  interval_minutes: 60
  min_support: 200         # require this much evidence before proposing
  min_posterior: 0.9       # P(agent | feature) must exceed this
  auto_promote_confidence: 0.0  # 0 = never auto-promote (manual review)
  write_path: learned.yaml  # resolved relative to rulesDir (configs/veilgate.yaml -> rules_dir)

# Path redaction: scrub high-entropy URL segments before they become Bayes
# buckets. UUIDs, long numeric IDs, hex strings, and base64 tokens are
# always redacted by the built-in ruleset; this section lets you add
# app-specific identifiers (medical record numbers, account codes) so
# your domain identifiers never land in learned.yaml.
path_redaction:
  enabled: true
  custom: []
    # Example: redact patient identifiers in healthcare deployments.
    # - regex: "^MRN-\\d+$"
    #   replace: "<patient>"
    # - regex: "^acct_[A-Za-z0-9]+$"
    #   replace: "<account>"

# Signal recommender — analyses live traffic and proposes custom_signals entries
# for signals.yaml. Suggestions are written to signal_suggestions.yaml (never
# to signals.yaml itself). Review each entry, set enabled: true, then paste
# into custom_signals: in your signals.yaml.
signal_recommender:
  enabled: true
  interval_hours: 24            # how often the background pass fires
  min_confidence: 0.85          # precision floor: tarpitted/(tarpitted+clean)
  min_support: 30               # minimum matching request count
  max_suggestions: 20           # cap on output list length
  lookback_hours: 168           # 7 days of history
  write_path: signal_suggestions.yaml
  false_positive_threshold: 0.02  # reject if >2% of clean traffic matches
