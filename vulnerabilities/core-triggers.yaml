# Core vulnerability detection triggers — probe paths, SQL injection
# patterns, and environment exposure paths. Add entries in subdirectories.

probe_paths:
  # Admin / internal panels.
  - /admin-panel-v2
  - /api/internal/debug
  - /api/internal/profiler
  - /api/internal/rpc
  - /api/internal/metrics
  - /api/internal/flush-cache

  # Config / secrets.
  - /.git/config
  - /.env.backup

  # Legacy WordPress / PHP paths.
  - /wp-admin-old
  - /phpmyadmin-backup

  # Modern API discovery paths.
  - /prisma-studio
  - /studio
  - /api/docs/openapi.json
  - /api/docs/swagger
  - /api/graphql
  - /graphql
  - /v1/models

  # Next.js / Vite debug endpoints.
  - /__nextjs_original-stack-frame
  - /api/debug

  # WordPress / PHP
  - /wp-admin
  - /wp-login.php
  - /wp-json/
  - /wp-content/plugins/
  - /wp-content/themes/
  - /readme.html
  - /phpmyadmin
  - /phpMyAdmin
  - /pma
  - /mysql
  - /dbadmin
  - /adminer.php
  # Spring Boot / Java
  - /actuator/env
  - /actuator/configprops
  - /actuator/beans
  - /actuator/heapdump
  - /actuator/threaddump
  - /actuator/mappings
  - /actuator/loggers
  - /actuator/prometheus
  # Server monitoring
  - /server-status
  - /nginx_status
  # CI / Code execution
  - /jenkins
  - /console
  # Go runtime
  - /debug/pprof/
  # Laravel debug
  - /_ignition/execute-solution
  - /_ignition/health-check
  - /vendor/phpunit/phpunit/
  - /storage/logs/laravel.log
  # Worker dashboards
  - /sidekiq
  # Monitoring
  - /grafana
  - /prometheus
  - /graph
  - /targets
  - /api/v1/targets
  # Atlassian
  - /confluence
  - /jira
  - /login.action
  - /setup/setupadministrator.action
  - /plugins/servlet/
  - /rest/api/
  - /secure/Dashboard.jspa
  # Elasticsearch
  - /_cat/indices
  - /_cluster/health
  - /_search
  - /_nodes

sql_injection_patterns:
  - "'"
  - "\""
  - "--"
  - "union"
  - "select"
  - "or 1=1"
  - "or+1=1"
  - "or%201=1"
  - "'or'1'='1"
  - "/*"
  - "*/"
  - "sleep("
  - "waitfor delay"
  - "benchmark("
  - "pg_sleep("
  - "xp_cmdshell"

ssrf_patterns:
  - "http://169.254.169.254"
  - "https://169.254.169.254"
  - "169.254.169.254/latest/meta-data"
  - "metadata.google.internal"
  - "computeMetadata/v1"
  - "http://localhost"
  - "http://127.0.0.1"
  - "http://[::1]"
  - "http://0.0.0.0"
  - "file:///etc/"
  - "gopher://"
  - "dict://"
  - "ftp://"

xss_patterns:
  - "<script"
  - "</script"
  - "<img src=x"
  - "onerror="
  - "onload="
  - "javascript:"
  - "document.cookie"
  - "alert("
  - "prompt("
  - "svg/onload"

path_traversal_patterns:
  - "../"
  - "..%2f"
  - "..%5c"
  - "%2e%2e%2f"
  - "..\\"
  - "/etc/passwd"
  - "/etc/shadow"
  - "boot.ini"

command_injection_patterns:
  - ";id"
  - "|id"
  - "&&id"
  - "`id`"
  - "$(id)"
  - "; cat /etc/"
  - "/bin/sh"
  - "/bin/bash"
  - "wget "
  - "curl "

xxe_patterns:
  - "<!doctype"
  - "<!entity"
  - "system \"file://"
  - "system 'file://"
  - "system \"http://"

ssti_patterns:
  - "{{7*7}}"
  - "${7*7}"
  - "<%=7*7%>"
  - "#{7*7}"
  - "{{config"
  - "{{self"

nosql_patterns:
  - "$where"
  - "$ne"
  - "$regex"
  - "$gt"
  - "$nin"

prototype_pollution_patterns:
  - "__proto__"
  - "constructor[prototype]"
  - "constructor.prototype"
  - "prototype.polluted"

vcs_paths:
  - "/.git/config"
  - "/.git/HEAD"
  - "/.git/COMMIT_EDITMSG"
  - "/.git/packed-refs"
  - "/.git/refs/heads/main"
  - "/.git/logs/HEAD"

env_paths:
  - "/.env"
  - "/.env.backup"
  - "/.env.prod"
  - "/.env.production"
  - "/.env.local"
  - "/.env.staging"
  - "/config.json"
  - "/config.yml"
  - "/config.yaml"
  - "/application.properties"
  - "/application.yml"
  - "/bootstrap.yml"
  - "/settings.py"
  - "/local_settings.py"
  - "/web.config"
  - "/appsettings.json"
  - "/secrets.json"
  - "/credentials.json"
  - "/service-account.json"
  - "/firebase.json"
  - "/.aws/credentials"
  - "/.npmrc"
  - "/.docker/config.json"
  - "/.svn/entries"
  - "/.DS_Store"
  - "/config/.env"
