# Community injection strategy routes — prepended BEFORE the root file's routes.
# First match wins, so these run before the generic catch-all (match: any).
#
# Add new route families here without editing core-routes.yaml.

routes:
  # SPA package/bundle surfaces mined by agents after fetching the frontend.
  - match: exact
    values:
      - /package.json
      - /client/package.json
      - /app/package.json
    template: spa_package_json

  - match: regex
    values:
      - "\\.(js\\.map|mjs\\.map|map)$"
    template: spa_source_map

  - match: prefix
    values:
      - /node_modules/
      - /.vite/deps/
      - /assets/
      - /static/js/
      - /_next/static/
    template: spa_runtime_bundle

  # GraphQL introspection — return a convincing schema error (not a 404).
  - match: contains
    values:
      - /graphql
      - /graphiql
      - /api/graphql
    template: api_error_500

  # Swagger / OpenAPI explorer — return the Prisma 500 template so it looks
  # like the docs endpoint is misconfigured, not intentionally absent.
  - match: prefix
    values:
      - /api/docs/
      - /swagger
      - /swagger-ui
      - /openapi
    template: api_error_500

  # Prisma Studio — return a realistic forbidden response.
  - match: prefix
    values:
      - /prisma-studio
      - /studio
    template: api_forbidden

  # Cloud IMDS / metadata endpoints — return a realistic forbidden.
  - match: prefix
    values:
      - /latest/meta-data/
      - /latest/api/token
    template: api_forbidden

  # Kubernetes API — 403 with a realistic JSON body.
  - match: prefix
    values:
      - /apis/
      - /healthz
      - /readyz
      - /livez
    template: api_forbidden

  # Spring Boot Actuator — return a realistic 401.
  - match: prefix
    values:
      - /actuator/
    template: api_unauthorized

  # Backup / archive file probes — return the env_backup template to bait
  # agents into thinking they found real secrets.
  - match: regex
    values:
      - "\\.(bak|old|backup|orig|sql|tar\\.gz|zip)$"
    template: env_backup

  # Next.js / webpack internals.
  - match: prefix
    values:
      - /__nextjs
      - /webpack-hmr
    template: spa_runtime_bundle
