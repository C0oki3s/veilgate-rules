# Community injection strategy routes — prepended BEFORE the root file's routes.
# First match wins, so these run before the generic catch-all (match: any).
#
# Add new route families here without editing core-routes.yaml.

routes:
  # SPA package/bundle surfaces mined by agents after fetching the frontend.
  - match: exact
    values:
      - /package.json
      - /client/package.json
      - /app/package.json
    template: spa_package_json

  - match: regex
    values:
      - "\\.(js\\.map|mjs\\.map|map)$"
    template: spa_source_map

  - match: prefix
    values:
      - /node_modules/
      - /.vite/deps/
      - /assets/
      - /static/js/
      - /_next/static/
    template: spa_runtime_bundle

  # GraphQL introspection — return a convincing schema error (not a 404).
  - match: contains
    values:
      - /graphql
      - /graphiql
      - /api/graphql
      - /playground
    template: api_error_500

  # Swagger / OpenAPI explorer — return rendered API docs, not a dead 404.
  - match: exact
    values:
      - /api
      - /api/debug
      - /api/docs
      - /api/swagger
      - /swagger-ui.html
      - /openapi.json
      - /openapi/v2
      - /swagger-ui
    template: swagger_ui_page

  - match: prefix
    values:
      - /api/docs/
      - /swagger
      - /swagger-ui
      - /openapi
    template: swagger_ui_page

  # Prisma Studio — return a realistic forbidden response.
  - match: prefix
    values:
      - /prisma-studio
      - /studio
    template: api_forbidden

  # Cloud IMDS / metadata endpoints — return a realistic forbidden.
  - match: prefix
    values:
      - /latest/meta-data/
      - /latest/api/token
    template: api_forbidden

  # Kubernetes API — 403 with a realistic JSON body.
  - match: exact
    values:
      - /api/v1
      - /apis
      - /kubernetes-dashboard
      - /dashboard
    template: k8s_dashboard

  - match: prefix
    values:
      - /apis/
      - /api/v1
      - /kubernetes-dashboard/
      - /dashboard/
      - /healthz
      - /readyz
      - /livez
    template: k8s_dashboard

  # Spring Boot Actuator — health and info return 200; sensitive endpoints leak data.
  - match: exact
    values:
      - /actuator
      - /actuator/health
      - /actuator/info
    template: actuator_health

  - match: prefix
    values:
      - /actuator/env
      - /actuator/configprops
      - /actuator/beans
      - /actuator/mappings
      - /actuator/loggers
      - /actuator/prometheus
    template: actuator_env

  - match: prefix
    values:
      - /actuator/heapdump
      - /actuator/threaddump
    template: env_backup

  - match: prefix
    values:
      - /actuator/
    template: api_unauthorized

  # Backup / archive file probes — return the env_backup template to bait
  # agents into thinking they found real secrets.
  - match: regex
    values:
      - "\\.(bak|old|backup|orig|sql|tar\\.gz|zip|json|ya?ml|properties|config)$"
    template: env_backup

  - match: exact
    values:
      - /.env.prod
      - /.env.production
      - /.env.local
      - /.env.example
      - /config.json
      - /config.yml
      - /config.yaml
      - /application.properties
      - /application.yml
      - /bootstrap.yml
      - /settings.py
      - /local_settings.py
      - /web.config
      - /appsettings.json
      - /secrets.json
      - /credentials.json
      - /service-account.json
      - /firebase.json
      - /.aws/credentials
      - /.npmrc
      - /.docker/config.json
      - /.svn/entries
      - /.DS_Store
      - /backup.sql
      - /database.sql
      - /www.zip
      - /source.zip
      - /config.php.bak
    template: env_backup

  # Next.js / webpack internals.
  - match: prefix
    values:
      - /__nextjs
      - /webpack-hmr
    template: spa_runtime_bundle
